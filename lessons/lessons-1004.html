/* Concept animations: used only inside chemistry diagrams, never as decoration */
.diagram .flow-dash { stroke-dasharray: 10 12; animation: flowDash 1.4s linear infinite; }
.diagram .flow-dash-slow { stroke-dasharray: 12 16; animation: flowDash 2.2s linear infinite; }
.diagram .pulse-soft { animation: pulseSoft 1.8s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
.diagram .pulse-delay { animation-delay:.55s; }
.diagram .float-up { animation: floatUp 2.8s ease-in-out infinite; }
.diagram .float-delay { animation-delay:.7s; }
.diagram .shake-drop { animation: dropShake 1.2s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
.diagram .grow-layer { transform-origin:center bottom; transform-box:fill-box; animation: growLayer 2.4s ease-in-out infinite; }
.diagram .rust-spot { animation: rustPulse 2.4s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
@keyframes flowDash { to { stroke-dashoffset: -44; } }
@keyframes pulseSoft { 0%,100% { opacity:.55; transform:scale(1); } 50% { opacity:1; transform:scale(1.08); } }
@keyframes floatUp { 0% { transform:translateY(18px); opacity:.15; } 35% { opacity:1; } 100% { transform:translateY(-22px); opacity:.05; } }
@keyframes dropShake { 0%,100% { transform:translateY(0); } 50% { transform:translateY(5px); } }
@keyframes growLayer { 0%,100% { transform:scaleY(.35); opacity:.65; } 50% { transform:scaleY(1); opacity:1; } }
@keyframes rustPulse { 0%,100% { opacity:.25; transform:scale(.8); } 50% { opacity:1; transform:scale(1.08); } }
@media (prefers-reduced-motion: reduce), print {

 litres."}, {"name": "Number of moles", "formula": "n = given mass / molar mass", "where": "n in mol", "use": "Needed before molarity calculation.", "care": "Use correct molar mass from formula."}, {"name": "Normality", "formula": "N = gram equivalents / volume in litre", "where": "eq L⁻¹", "use": "Useful in acid-base titration calculations.", "care": "Equivalent mass = molar mass / valency factor."}, {"name": "ppm", "formula": "ppm = mg of solute / litre of solution", "where": "For dilute aqueous solutions", "use": "Used for hardness, impurities and water quality.", "care": "1 ppm ≈ 1 mg/L in water."}, {"name": "pH", "formula": "pH = −log₁₀[H⁺]", "where": "[H⁺] in mol L⁻¹", "use": "Measure of acidity.", "care": "Low pH means high acidity."}, {"name": "pOH", "formula": "pOH = −log₁₀[OH⁻]", "where": "[OH⁻] in mol L⁻¹", "use": "Measure of basicity.", "care": "At 25°C, pH + pOH = 14."}, {"name": "Normality equation", "formula": "N₁V₁ = N₂V₂", "where": "For acid-base titration at equivalence point", "use": "Find unknown concentration from titration data.", "care": "Use same volume unit on both sides."}, {"name": "Faraday’s first law", "formula": "m = ZIt", "where": "m mass deposited, Z electrochemical equivalent, I current, t time", "use": "Mass deposited during electrolysis.", "care": "Convert time to seconds."}, {"name": "Faraday constant method", "formula": "m = (EIt) / F", "where": "E equivalent mass, F = 96500 C mol⁻¹ eq⁻¹", "use": "Electrolysis numerical problems.", "care": "Equivalent mass = atomic mass / valency."}, {"name": "Cell EMF", "formula": "Ecell = Ecathode − Eanode", "where": "Electrode potentials in volt", "use": "Find emf of electrochemical cell.", "care": "Cathode is reduction electrode."}, {"name": "Water hardness as CaCO₃", "formula": "Hardness = (mass of CaCO₃ equivalent / volume of water) × 10⁶", "where": "ppm", "use": "Express water hardness in common engineering unit.", "care": "Convert all values consistently."}], "modules": [{"id": "m1", "name": "Atomic Structure and Chemical Bonding", "co": "CO1", "hours": "8", "intro": "This module builds the foundation for understanding how atoms are arranged, why electrons occupy specific orbitals, and how atoms combine through chemical bonds.", "mal": "ഈ module atomic structure, orbital concept, electronic configuration, chemical bonding എന്നിവയ്ക്ക് base നൽകുന്നു. Chemistry-ൽ later topics മനസ്സിലാക്കാൻ ഇതാണ് foundation.", "lessons": [{"code": "M1.01", "title": "Structure of atom and Bohr’s atom model", "english": "An atom is the smallest unit of an element that shows the chemical properties of that element. It contains a positively charged nucleus with protons and neutrons, and negatively charged electrons arranged around the nucleus. In Bohr’s model, electrons revolve only in certain permitted circular orbits called shells or energy levels. As long as an electron remains in a permitted orbit, it does not radiate energy. Energy is absorbed when an electron jumps to a higher orbit and emitted when it returns to a lower orbit. This model explains stability of atoms and line spectrum of hydrogen, but it cannot explain spectra of multi-electron atoms or fine structure of spectral lines.", "malayalam": "Atom എന്നത് ഒരു element-ന്റെ chemical property കാണിക്കുന്ന ഏറ്റവും ചെറിയ unit ആണ്. Nucleus-ൽ proton, neutron എന്നിവ ഉണ്ടാകും; electron-കൾ nucleus-നെ ചുറ്റി shells/energy levels-ൽ കാണപ്പെടുന്നു. Bohr model പ്രകാരം electron-കൾ allowed orbit-ൽ ഇരിക്കുമ്പോൾ energy radiate ചെയ്യില്ല. Electron higher orbit-ലേക്ക് പോകുമ്പോൾ energy absorb ചെയ്യുകയും lower orbit-ലേക്ക് മടങ്ങുമ്പോൾ energy emit ചെയ്യുകയും ചെയ്യും. Hydrogen spectrum explain ചെയ്യാൻ ഇത് സഹായിച്ചെങ്കിലും multi-electron atoms explain ചെയ്യാൻ limitation ഉണ്ട്.", "points": ["Nucleus contains protons and neutrons.", "Electrons occupy permitted energy levels called shells.", "Bohr model explains atomic stability and hydrogen spectrum.", "Main limitation: not suitable for complex atoms."], "examples": ["Hydrogen atom has one proton and one electron.", "Sodium has electronic configuration 2,8,1 and easily forms Na⁺."], "applications": ["Understanding valency and bonding.", "Explaining emission spectra used in analysis and lamps."], "tips": ["For exam: write postulates first, then merits and demerits separately.", "Do not write Bohr radius/energy derivation because syllabus omits expression."], "diagram": "atom"}, {"code": "M1.02", "title": "Dual nature, de Broglie equation and uncertainty principle", "english": "Light and matter show dual nature: they can behave as waves and particles depending on the experiment. de Broglie proposed that every moving particle has an associated matter wave. Its wavelength is inversely proportional to momentum, so very small particles like electrons show wave nature clearly, while ordinary objects have extremely small wavelengths. Heisenberg’s uncertainty principle says that it is impossible to determine both the exact position and exact momentum of a microscopic particle at the same time. This is not due to instrument defect; it is a fundamental limitation in the microscopic world.", "malayalam": "Light-നും matter-നും dual nature ഉണ്ട്: ചില സാഹചര്യങ്ങളിൽ wave പോലെ, ചിലപ്പോൾ particle പോലെ behave ചെയ്യും. de Broglie പ്രകാരം moving particle-ന് matter wave ഉണ്ടാകും. Momentum കൂടുതലായാൽ wavelength കുറയും. Electron പോലുള്ള small particles-ൽ wave nature വ്യക്തമാണ്. Heisenberg uncertainty principle പ്രകാരം ഒരു microscopic particle-ന്റെ exact position ഉം exact momentum ഉം ഒരേ സമയം കൃത്യമായി അറിയാൻ കഴിയില്ല. ഇത് instrument error അല്ല; microscopic level-ലെ basic limitation ആണ്.", "points": ["de Broglie equation: λ = h/mv.", "Heisenberg principle: Δx Δp ≥ h/4π.", "Matter waves are significant for electrons and other microscopic particles.", "Uncertainty principle is important in quantum chemistry."], "examples": ["Electron diffraction proves wave nature of electrons.", "A cricket ball has matter wave, but its wavelength is too small to observe."], "applications": ["Electron microscope.", "Understanding orbitals and quantum model of atom."], "tips": ["Numerical steps: write formula, convert mass and velocity to SI, substitute, final wavelength in metre.", "Do not confuse de Broglie wavelength with ordinary light wavelength."], "diagram": "wave"}, {"code": "M1.03", "title": "Orbitals, quantum numbers and electronic configuration", "english": "In modern atomic theory, an orbital is a three-dimensional region around the nucleus where the probability of finding an electron is maximum. Orbitals are described using quantum numbers. The principal quantum number n gives shell, azimuthal quantum number l gives subshell, magnetic quantum number m gives orientation, and spin quantum number s gives spin of electron. Electronic configuration is written using Aufbau principle, Pauli exclusion principle and Hund’s rule. Aufbau principle says electrons fill lower energy orbitals first. Pauli principle says an orbital can contain maximum two electrons with opposite spins. Hund’s rule says electrons occupy degenerate orbitals singly before pairing.", "malayalam": "Modern atomic theory-ൽ orbital എന്നത് electron കണ്ടെത്താനുള്ള probability ഏറ്റവും കൂടുതലുള്ള 3D region ആണ്. Quantum numbers orbital-ന്റെ details പറയുന്നു: n shell, l subshell, m orientation, s spin. Electronic configuration എഴുതുമ്പോൾ Aufbau principle, Pauli exclusion principle, Hund’s rule എന്നിവ follow ചെയ്യണം. Low energy orbital ആദ്യം fill ചെയ്യണം. ഒരു orbital-ൽ maximum രണ്ട് electron-കൾ opposite spin-ൽ മാത്രം. Equal energy orbitals-ൽ ആദ്യം singly fill ചെയ്ത് ശേഷം pairing നടക്കും.", "points": ["s orbital holds 2 electrons; p holds 6; d holds 10; f holds 14.", "Aufbau order begins 1s, 2s, 2p, 3s, 3p, 4s, 3d.", "Pauli: no two electrons in an atom have the same four quantum numbers.", "Hund: maximum multiplicity before pairing."], "examples": ["Carbon: 1s² 2s² 2p².", "Calcium: 1s² 2s² 2p⁶ 3s² 3p⁶ 4s²."], "applications": ["Predicting valency and bonding behaviour.", "Understanding periodic properties."], "tips": ["Learn first 20 elements by shell configuration: 2, 8, 8, 2 pattern helps.", "In exam, write both orbital notation and shell distribution if asked."], "diagram": "orbitals"}, {"code": "M1.04", "title": "Chemical bonding: ionic, covalent, coordinate and hydrogen bonding", "english": "Chemical bonding is the attractive force that holds atoms together in molecules or crystals. Atoms combine to attain stable electronic configuration, often octet configuration. Ionic bond is formed by transfer of electrons, as in NaCl. Covalent bond is formed by sharing of electrons, as in H₂ and HF. Coordinate bond is a covalent bond in which the shared pair is donated by one atom, as in NH₄⁺. Hydrogen bonding is a weak attraction involving hydrogen bonded to highly electronegative atoms like F, O or N. Hydrogen bonding explains anomalous behaviour of water such as high boiling point, high surface tension and lower density of ice.", "malayalam": "Chemical bond എന്നത് atoms-നെ molecule/crystal-ൽ പിടിച്ചു നിർത്തുന്ന attractive force ആണ്. Stable electronic configuration നേടാൻ atoms combine ചെയ്യുന്നു. Electron transfer വഴി ionic bond ഉണ്ടാകും; ഉദാ: NaCl. Electron sharing വഴി covalent bond ഉണ്ടാകും; ഉദാ: H₂, HF. Shared pair ഒരു atom donate ചെയ്യുമ്പോൾ coordinate bond; ഉദാ: NH₄⁺. H atom F/O/N പോലുള്ള electronegative atom-നോട് bonded ആയാൽ hydrogen bonding ഉണ്ടാകും. Water-ന്റെ high boiling point, ice density കുറവ് തുടങ്ങിയ anomalous behaviour ഇതിലൂടെ explain ചെയ്യാം.", "points": ["Octet rule: atoms tend to attain eight electrons in valence shell.", "Ionic bond: electron transfer and electrostatic attraction.", "Covalent bond: sharing of electron pair.", "Coordinate bond: donor atom supplies both shared electrons.", "Hydrogen bonding: intermolecular or intramolecular attraction."], "examples": ["Na + Cl → Na⁺Cl⁻.", "H₂ has one shared pair.", "NH₃ donates lone pair to H⁺ to form NH₄⁺."], "applications": ["Explaining properties of salts, polymers and water.", "Choosing materials based on bonding and structure."], "tips": ["Bond-type answers should include definition + formation + example + property.", "For H₂O, mention hydrogen bonding and tetrahedral bent arrangement only briefly."], "diagram": "bond"}]}, {"id": "m2", "name": "Analytical Chemistry and Water Treatment", "co": "CO2", "hours": "14", "intro": "This module connects chemistry calculations with real engineering needs such as solution preparation, titration, pH control, hardness removal and potable water treatment.", "mal": "ഈ module chemistry calculations engineering use-നോട് connect ചെയ്യുന്നു: solution preparation, titration, pH control, hardness removal, potable water treatment എന്നിവ പ്രധാനമാണ്.", "lessons": [{"code": "M2.01", "title": "Solutions and concentration: molarity, normality and ppm", "english": "A solution is a homogeneous mixture of solute and solvent. The solute is the substance dissolved and the solvent is the medium that dissolves it. In chemistry and engineering, concentration tells how much solute is present in a given quantity of solution. Molarity is moles of solute per litre of solution. Normality is gram equivalents of solute per litre of solution. ppm means parts per million and is commonly used for very dilute solutions such as water impurities and hardness. Concentration calculations are important in titration, water treatment, electroplating bath preparation and industrial chemical dosing.", "malayalam": "Solution എന്നത് solute solvent-ൽ dissolve ചെയ്ത് ഉണ്ടാകുന്ന homogeneous mixture ആണ്. Solute dissolve ചെയ്യുന്ന substance, solvent dissolve ചെയ്യിക്കുന്ന medium. Concentration solution-ൽ solute എത്രയുണ്ട് എന്ന് പറയുന്നു. Molarity = litre-ൽ moles. Normality = litre-ൽ gram equivalents. ppm dilute solutions-ൽ, പ്രത്യേകിച്ച് water quality-ൽ ഉപയോഗിക്കുന്നു. Titration, water treatment, electroplating bath, chemical dosing എന്നിവയ്ക്ക് concentration calculation വളരെ പ്രധാനമാണ്.", "points": ["M = moles / volume in litre.", "Normality depends on equivalent mass.", "ppm is useful for water quality and hardness.", "Always convert mL to L before calculation."], "examples": ["0.1 M NaOH means 0.1 mole NaOH in 1 litre solution.", "50 ppm chloride means about 50 mg chloride per litre of water."], "applications": ["Preparation of standard solution.", "Chemical dosing in boilers and treatment plants."], "tips": ["Molarity problem format: mass → moles → volume in litre → M.", "Normality problem format: mass → equivalents → volume → N."], "diagram": "solution"}, {"code": "M2.02", "title": "pH, pOH, buffer solutions and applications of pH", "english": "pH is a logarithmic measure of hydrogen ion concentration. A solution with pH less than 7 is acidic, pH 7 is neutral and pH greater than 7 is basic at 25°C. pOH measures hydroxide ion concentration and pH + pOH = 14 for aqueous solutions at 25°C. Buffer solutions resist change in pH when small amounts of acid or base are added. Acidic buffer contains a weak acid and its salt, for example acetic acid and sodium acetate. Basic buffer contains a weak base and its salt, for example ammonium hydroxide and ammonium chloride. pH control is important in water treatment, agriculture, medicine, electroplating and corrosion prevention.", "malayalam": "pH എന്നത് hydrogen ion concentration-ന്റെ logarithmic measure ആണ്. pH 7-ൽ താഴെ acidic, 7 neutral, 7-ൽ മുകളിൽ basic. pOH hydroxide ion concentration കാണിക്കുന്നു; 25°C-ൽ pH + pOH = 14. Buffer solution ചെറിയ acid/base ചേർത്താലും pH വലിയ മാറ്റം വരാതെ maintain ചെയ്യും. Acetic acid + sodium acetate acidic buffer; ammonium hydroxide + ammonium chloride basic buffer. Water treatment, agriculture, medicine, electroplating, corrosion control എന്നിവയിൽ pH control പ്രധാനമാണ്.", "points": ["pH = −log[H⁺].", "pOH = −log[OH⁻].", "pH + pOH = 14 at 25°C.", "Buffers resist pH change."], "examples": ["[H⁺] = 10⁻³ M gives pH = 3.", "Blood pH is maintained nearly constant by buffer systems."], "applications": ["Controlling boiler water pH.", "Maintaining electroplating bath quality."], "tips": ["Remember: acidic means lower pH, not higher pH.", "In log problems, 10⁻⁵ gives pH 5 directly."], "diagram": "ph"}, {"code": "M2.03", "title": "Volumetric analysis and titration", "english": "Volumetric analysis is a quantitative method used to find the concentration of a solution by measuring the volume of another solution of known concentration required for complete reaction. In titration, the known solution is usually taken in a burette and the unknown solution in a conical flask. The end point is the stage at which the indicator shows completion of reaction by a colour change. The choice of indicator depends on the type of titration. For strong acid–strong base titration, phenolphthalein or methyl orange may be used. The normality equation N₁V₁ = N₂V₂ is used when acid and base react completely in equivalent amounts.", "malayalam": "Volumetric analysis concentration അറിയാത്ത solution-ന്റെ concentration കണ്ടെത്താൻ ഉപയോഗിക്കുന്ന quantitative method ആണ്. Known concentration solution burette-ൽ, unknown solution conical flask-ൽ എടുക്കുന്നു. Indicator colour change കാണിക്കുന്ന point ആണ് end point. Indicator തിരഞ്ഞെടുക്കുന്നത് titration type-നെ ആശ്രയിക്കും. Strong acid–strong base titration-ൽ phenolphthalein അല്ലെങ്കിൽ methyl orange ഉപയോഗിക്കാം. Acid-base equivalents equal ആയപ്പോൾ N₁V₁ = N₂V₂ ഉപയോഗിക്കുന്നു.", "points": ["Standard solution: accurately known concentration.", "Burette measures volume delivered.", "Pipette transfers fixed volume.", "Indicator detects end point.", "Normality equation: N₁V₁ = N₂V₂."], "examples": ["HCl vs NaOH titration using phenolphthalein.", "Hardness estimation uses EDTA titration in laboratories."], "applications": ["Quality control in chemical industries.", "Water analysis and acid/base concentration measurement."], "tips": ["Read lower meniscus at eye level.", "Rinse burette with titrant and pipette with solution to be pipetted."], "diagram": "titration"}, {"code": "M2.04", "title": "Hard water, water softening and municipal water treatment", "english": "Hard water does not easily produce lather with soap because calcium and magnesium ions react with soap to form insoluble scum. Temporary hardness is mainly due to bicarbonates of calcium and magnesium; permanent hardness is due to chlorides and sulphates. In boilers, hard water causes scale formation, reduced heat transfer, wastage of fuel and corrosion. Lime-soda process removes hardness by converting soluble calcium and magnesium salts into insoluble precipitates. Ion exchange method removes Ca²⁺ and Mg²⁺ ions using resins. Potable water must be colourless, odourless, free from harmful microorganisms and safe for drinking. Municipal treatment generally includes sedimentation, coagulation, filtration and sterilization by chlorination, bleaching powder or UV radiation.", "malayalam": "Hard water soap-നൊപ്പം lather ഉണ്ടാക്കാൻ ബുദ്ധിമുട്ടാണ്, കാരണം Ca²⁺, Mg²⁺ ions soap-നോട് react ചെയ്ത് insoluble scum ഉണ്ടാക്കും. Temporary hardness calcium/magnesium bicarbonates കാരണം; permanent hardness chlorides/sulphates കാരണം. Boiler-ൽ scale, heat transfer കുറവ്, fuel waste, corrosion എന്നിവ ഉണ്ടാകും. Lime-soda process soluble salts-നെ insoluble precipitate ആക്കും. Ion exchange method resin ഉപയോഗിച്ച് Ca²⁺, Mg²⁺ remove ചെയ്യും. Potable water drinking-ന് safe ആയിരിക്കണം. Municipal treatment-ൽ sedimentation, coagulation, filtration, sterilization എന്നിവ നടക്കുന്നു.", "points": ["Hardness causing ions: Ca²⁺ and Mg²⁺.", "Boiler problems: scale and corrosion.", "Softening methods: lime-soda and ion exchange.", "Municipal water treatment: sedimentation → coagulation → filtration → sterilization."], "examples": ["Kettles and boilers get scale deposits in hard water areas.", "Chlorination kills disease-causing microorganisms."], "applications": ["Boiler feed water treatment.", "Drinking water purification and industrial process water."], "tips": ["For water treatment answer, write each step in order and mention its purpose.", "Do not confuse filtration with sterilization: filtration removes suspended particles; sterilization kills microbes."], "diagram": "water"}]}, {"id": "m3", "name": "Engineering Materials, Polymers and Nanomaterials", "co": "CO3", "hours": "9", "intro": "This module explains materials used in engineering applications: alloys, glasses, refractories, polymers, rubbers and nanomaterials.", "mal": "Engineering applications-ൽ ഉപയോഗിക്കുന്ന alloys, glasses, refractory materials, polymers, rubber, nanomaterials എന്നിവ ഈ module-ൽ പഠിക്കുന്നു.", "lessons": [{"code": "M3.01", "title": "Alloys, glasses and refractory materials", "english": "Engineering materials are selected according to strength, corrosion resistance, temperature resistance, cost and workability. An alloy is a metallic material formed by mixing two or more elements, at least one of which is a metal. Alloying improves properties such as hardness, strength, corrosion resistance and castability. Brass is an alloy of copper and zinc, used in fittings and decorative parts. Bronze is copper and tin, used in bearings and statues. Solder is mainly lead-tin or tin-based alloy used for joining metals. Glasses are amorphous inorganic materials. Sodium silicate glass is common glass, borosilicate glass resists thermal shock, safety glass reduces injury, and insulating glass reduces heat transfer. Refractory materials withstand high temperature without softening and are used in furnaces, kilns and boilers.", "malayalam": "Engineering materials തിരഞ്ഞെടുക്കുമ്പോൾ strength, corrosion resistance, temperature resistance, cost, workability എന്നിവ നോക്കണം. Alloy എന്നത് രണ്ട് അല്ലെങ്കിൽ കൂടുതൽ elements ചേർന്ന metallic material ആണ്. Alloying hardness, strength, corrosion resistance തുടങ്ങിയ properties improve ചെയ്യും. Brass = copper + zinc; Bronze = copper + tin; Solder metal joining-ന് ഉപയോഗിക്കുന്നു. Glass amorphous inorganic material ആണ്. Borosilicate glass thermal shock resist ചെയ്യും. Safety glass breakage injury കുറയ്ക്കും. Refractory materials high temperature-ൽ soften ചെയ്യാതെ നിലനിൽക്കും; furnaces, kilns, boilers എന്നിവയിൽ ഉപയോഗിക്കുന്നു.", "points": ["Purpose of alloying: improve strength, hardness, corrosion resistance, casting property.", "Brass: Cu + Zn; Bronze: Cu + Sn; Solder: joining alloy.", "Borosilicate glass resists thermal shock.", "Refractory materials must have high melting point and chemical stability."], "examples": ["Brass taps and valves.", "Fire bricks inside furnaces.", "Borosilicate glass in laboratory beakers."], "applications": ["Machine parts, electrical fittings, laboratory apparatus, furnace lining."], "tips": ["Material answer method: composition → property → use.", "For refractory, always mention high-temperature application."], "diagram": "materials"}, {"code": "M3.02", "title": "Polymers, plastics and rubber", "english": "A polymer is a large molecule formed by joining many small molecules called monomers. Polymerization is the process of forming polymer from monomers. Homopolymer is made from one type of monomer and copolymer from two or more monomers. Addition polymerization occurs without elimination of small molecules, as in polythene and PVC. Condensation polymerization occurs with elimination of small molecules such as water or HCl, as in Nylon-66 and Bakelite. Thermoplastics soften on heating and can be remoulded; thermosetting plastics become hard permanently and cannot be remoulded. Natural rubber is elastic but becomes sticky in summer and brittle in winter. Vulcanization with sulphur improves strength, elasticity and resistance. Buna-S and Buna-N are synthetic rubbers used in tyres, seals and oil-resistant products.", "malayalam": "Polymer എന്നത് monomer-കൾ ചേർന്ന് ഉണ്ടാകുന്ന large molecule ആണ്. Polymerization monomer-ൽ നിന്ന് polymer ഉണ്ടാക്കുന്ന process. Homopolymer ഒരു monomer type-ൽ നിന്ന്, copolymer രണ്ട് അല്ലെങ്കിൽ കൂടുതൽ monomer-ൽ നിന്ന്. Addition polymerization-ൽ small molecule eliminate ചെയ്യില്ല; ഉദാ: polythene, PVC. Condensation polymerization-ൽ water/HCl പോലുള്ള small molecule പുറത്തുപോകും; ഉദാ: Nylon-66, Bakelite. Thermoplastics heat ചെയ്യുമ്പോൾ soften ചെയ്ത് remould ചെയ്യാം. Thermosetting plastics permanent hard ആകും. Natural rubber sulphur ഉപയോഗിച്ച് vulcanize ചെയ്താൽ strength, elasticity, resistance improve ചെയ്യും. Buna-S, Buna-N synthetic rubbers ആണ്.", "points": ["Monomer is the repeating unit.", "Addition polymers: polythene, PVC.", "Condensation polymers: Nylon-66, Bakelite.", "Thermoplastic: remouldable; thermosetting: not remouldable.", "Vulcanization improves rubber properties."], "examples": ["Polythene bags and insulation.", "PVC pipes.", "Nylon fibres.", "Bakelite switches."], "applications": ["Cable insulation, pipes, machine parts, tyres, seals and electrical fittings."], "tips": ["Learn polymer examples with monomer + use as a pair.", "Do not call Bakelite a thermoplastic; it is thermosetting."], "diagram": "polymer"}, {"code": "M3.03", "title": "Nanomaterials and nanotechnology", "english": "Nanomaterials are materials with at least one dimension in the nanometre range, generally 1 to 100 nm. At nanoscale, materials may show properties different from bulk materials because of high surface area and quantum effects. Nanotechnology deals with design, production and application of materials at nanoscale. Based on dimension, nanomaterials can be classified as 0D, 1D and 2D. 0D materials have all dimensions in nanoscale, for example nanoparticles. 1D materials have two dimensions in nanoscale and one extended dimension, for example nanotubes and nanowires. 2D materials have one dimension in nanoscale, for example graphene sheets. Carbon nanotubes may be single-walled or multi-walled. Fullerenes are cage-like carbon molecules. Graphene is a single layer of carbon atoms arranged in hexagonal pattern.", "malayalam": "Nanomaterials-ൽ കുറഞ്ഞത് ഒരു dimension nanometre range-ൽ ആയിരിക്കും. Nanoscale-ൽ high surface area, quantum effects എന്നിവ കാരണം bulk material-നേക്കാൾ different properties കാണാം. Nanotechnology nanoscale materials design, production, application എന്നിവയെ കുറിച്ചാണ്. Dimension പ്രകാരം 0D, 1D, 2D ആയി classify ചെയ്യാം. 0D: nanoparticles; 1D: nanotubes/nanowires; 2D: graphene sheet. Carbon nanotubes SWCNT, MWCNT ആയി കാണാം. Fullerenes cage-like carbon molecules ആണ്. Graphene hexagonal pattern-ൽ carbon atoms ഉള്ള single layer ആണ്.", "points": ["Nanorange: about 1–100 nm.", "0D example: nanoparticles.", "1D example: carbon nanotubes.", "2D example: graphene.", "Nanomaterials show high surface area and special properties."], "examples": ["Silver nanoparticles show antimicrobial activity.", "CNTs have high strength and electrical conductivity."], "applications": ["Sensors, coatings, electronics, medicine, batteries and composite materials."], "tips": ["For classification, write dimension + example; do not write long unnecessary classification of CNT unless asked.", "Graphene is 2D, fullerene is 0D-like cage structure."], "diagram": "nano"}]}, {"id": "m4", "name": "Electrochemistry and Corrosion", "co": "CO4", "hours": "12", "intro": "This module explains electron-transfer reactions, electrolysis, electroplating, refining, electrochemical cells and corrosion control methods.", "mal": "Electron transfer reactions, electrolysis, electroplating, refining, electrochemical cells, corrosion prevention methods എന്നിവ ഈ module പഠിപ്പിക്കുന്നു.", "lessons": [{"code": "M4.01", "title": "Oxidation, reduction, conductors and electrolytes", "english": "Oxidation is the loss of electrons and reduction is the gain of electrons. A redox reaction is a reaction in which oxidation and reduction occur simultaneously. Metallic conductors conduct electricity due to movement of electrons, while electrolytic conductors conduct due to movement of ions. Electrolytes are substances that conduct electricity in molten or aqueous state and undergo chemical decomposition. Strong electrolytes ionize almost completely, while weak electrolytes ionize partially. Non-electrolytes do not conduct electricity in solution. Electrolysis is the chemical decomposition of an electrolyte by passing electric current. An electrolytic cell converts electrical energy into chemical change.", "malayalam": "Oxidation electron നഷ്ടപ്പെടൽ, reduction electron നേടൽ ആണ്. Redox reaction-ൽ oxidation ഉം reduction ഉം ഒരേസമയം നടക്കും. Metallic conductor-ൽ electrons move ചെയ്ത് current flow ചെയ്യും. Electrolytic conductor-ൽ ions move ചെയ്യും. Electrolyte molten/aqueous state-ൽ current conduct ചെയ്ത് chemical decomposition കാണിക്കും. Strong electrolytes almost complete ionization; weak electrolytes partial ionization. Non-electrolytes conduct ചെയ്യില്ല. Electric current ഉപയോഗിച്ച് electrolyte decompose ചെയ്യുന്നത് electrolysis ആണ്. Electrolytic cell electrical energy chemical change ആക്കുന്നു.", "points": ["Oxidation = loss of electrons.", "Reduction = gain of electrons.", "Strong electrolyte: HCl, NaOH, NaCl.", "Weak electrolyte: CH₃COOH, NH₄OH.", "Electrolysis needs electrolyte, electrodes and DC source."], "examples": ["Zn → Zn²⁺ + 2e⁻ is oxidation.", "Cu²⁺ + 2e⁻ → Cu is reduction."], "applications": ["Electroplating, refining, battery reactions and corrosion."], "tips": ["Use OIL RIG memory: Oxidation Is Loss, Reduction Is Gain.", "In electrolytic cell, anode is positive and cathode is negative."], "diagram": "redox"}, {"code": "M4.02", "title": "Faraday’s laws of electrolysis", "english": "Faraday’s first law states that the mass of substance deposited or liberated at an electrode is directly proportional to the quantity of electricity passed through the electrolyte. Since quantity of electricity Q = It, mass m = ZIt, where Z is electrochemical equivalent. Faraday’s second law states that when the same quantity of electricity passes through different electrolytes, the masses deposited are proportional to their equivalent masses. In practical problems, time must be converted to seconds and current must be in ampere. Faraday constant, approximately 96500 C, is the charge required to deposit or liberate one gram equivalent of a substance.", "malayalam": "Faraday’s first law പ്രകാരം electrode-ൽ deposited/liberated mass, electrolyte വഴി കടന്ന electric charge-നോട് directly proportional ആണ്. Q = It ആയതിനാൽ m = ZIt. Z electrochemical equivalent. Faraday’s second law പ്രകാരം same quantity electricity different electrolytes വഴി കടന്നാൽ deposited masses equivalent masses-നോട് proportional. Problems ചെയ്യുമ്പോൾ time seconds-ലും current ampere-ലും വേണം. Faraday constant ഏകദേശം 96500 C ആണ്; ഒരു gram equivalent deposit ചെയ്യാൻ വേണ്ട charge.", "points": ["First law: m ∝ Q, m = ZIt.", "Second law: masses deposited are proportional to equivalent masses.", "F = 96500 C per equivalent.", "Equivalent mass = atomic mass / valency."], "examples": ["Copper deposition during electrolysis of CuSO₄.", "Silver plating using controlled current and time."], "applications": ["Electroplating thickness control.", "Electrolytic refining and metal deposition."], "tips": ["Always convert minutes to seconds.", "Mention unit of current, time and mass in numerical answer."], "diagram": "faraday"}, {"code": "M4.03", "title": "Electroplating and electrolytic refining", "english": "Electroplating is the process of depositing a thin layer of one metal over another metal by electrolysis. It improves appearance, corrosion resistance and surface hardness. In nickel plating on mild steel, the mild steel article is made cathode, pure nickel is made anode and nickel salt solution is used as electrolyte. When current passes, nickel dissolves from anode as Ni²⁺ and deposits on the cathode article. Electrolytic refining is used to purify metals. In copper refining, impure copper is the anode, pure copper sheet is cathode and acidified copper sulphate solution is electrolyte. Copper dissolves from anode and pure copper deposits on cathode, while impurities settle as anode mud.", "malayalam": "Electroplating electrolysis ഉപയോഗിച്ച് ഒരു metal-ന്റെ thin layer മറ്റൊരു metal-ന്റെ surface-ൽ deposit ചെയ്യുന്നതാണ്. Appearance, corrosion resistance, surface hardness എന്നിവ improve ചെയ്യും. Nickel plating on mild steel-ൽ mild steel article cathode, pure nickel anode, nickel salt solution electrolyte. Current pass ചെയ്യുമ്പോൾ nickel anode-ൽ നിന്ന് dissolve ചെയ്ത് cathode-ൽ deposit ചെയ്യും. Electrolytic refining metal purify ചെയ്യാൻ ഉപയോഗിക്കുന്നു. Copper refining-ൽ impure copper anode, pure copper cathode, acidified copper sulphate electrolyte. Pure copper cathode-ൽ deposit ചെയ്യുകയും impurities anode mud ആയി settle ചെയ്യുകയും ചെയ്യും.", "points": ["Electroplating article is cathode.", "Plating metal is usually anode.", "Electrolyte contains ions of plating metal.", "Refining: impure metal anode, pure metal cathode."], "examples": ["Nickel plating on mild steel.", "Copper refining in industry."], "applications": ["Corrosion protection, decorative coating, electrical contacts, metal purification."], "tips": ["For electroplating diagram: label anode, cathode, electrolyte and DC source.", "Do not interchange article and anode in plating answer."], "diagram": "plating"}, {"code": "M4.04", "title": "Electrochemical cells and Daniell cell", "english": "An electrochemical cell converts chemical energy into electrical energy through a redox reaction. Primary cells are not easily rechargeable, secondary cells are rechargeable, and fuel cells produce electricity as long as fuel and oxidant are supplied. Daniell cell is a classical example of an electrochemical cell. It consists of zinc electrode dipped in zinc sulphate solution and copper electrode dipped in copper sulphate solution, connected by a salt bridge. At zinc electrode, oxidation occurs: Zn → Zn²⁺ + 2e⁻. At copper electrode, reduction occurs: Cu²⁺ + 2e⁻ → Cu. Electrons flow through the external circuit from zinc to copper. The salt bridge maintains electrical neutrality. Cell emf can be calculated using Ecell = Ecathode − Eanode.", "malayalam": "Electrochemical cell chemical energy electrical energy ആക്കി മാറ്റുന്നു. Primary cells recharge ചെയ്യാൻ സാധാരണയായി കഴിയില്ല; secondary cells rechargeable ആണ്; fuel cells fuel/oxidant supply ഉണ്ടായാൽ electricity produce ചെയ്യും. Daniell cell-ൽ zinc electrode zinc sulphate solution-ലും copper electrode copper sulphate solution-ലും ഇടുന്നു; salt bridge connect ചെയ്യും. Zinc electrode-ൽ oxidation: Zn → Zn²⁺ + 2e⁻. Copper electrode-ൽ reduction: Cu²⁺ + 2e⁻ → Cu. Electrons external circuit വഴി zinc-ൽ നിന്ന് copper-ലേക്ക് flow ചെയ്യും. Salt bridge electrical neutrality maintain ചെയ്യുന്നു. Ecell = Ecathode − Eanode ഉപയോഗിച്ച് emf calculate ചെയ്യാം.", "points": ["Anode in Daniell cell: zinc; oxidation.", "Cathode: copper; reduction.", "Salt bridge completes circuit and maintains neutrality.", "Ecell = Ecathode − Eanode."], "examples": ["Zn|Zn²⁺ || Cu²⁺|Cu cell notation.", "Dry cell is primary; lead-acid battery is secondary; hydrogen-oxygen cell is fuel cell."], "applications": ["Batteries, sensors and electrochemical measurements."], "tips": ["In galvanic cell, anode is negative and cathode is positive.", "Write half-cell reactions separately before total reaction."], "diagram": "daniell"}, {"code": "M4.05", "title": "Corrosion and corrosion prevention", "english": "Corrosion is the gradual destruction of a metal by chemical or electrochemical reaction with the environment. Rusting of iron is a common example. Corrosion rate increases with moisture, oxygen, salts, pollutants, temperature and contact with dissimilar metals. It causes loss of strength, leakage, failure of machines, contamination and economic loss. Corrosion prevention can be done by barrier protection, metallic coatings, non-metallic coatings and cathodic protection. In barrier protection, paint, grease or polymer coating prevents contact between metal and environment. Metallic coatings may be anodic or cathodic depending on the coating metal. Anodising forms a protective oxide layer on aluminium. In sacrificial anode method, a more active metal such as zinc or magnesium is connected to the protected metal, so the active metal corrodes preferentially.", "malayalam": "Corrosion എന്നത് metal environment-നോട് chemical/electrochemical reaction ചെയ്ത് धीरे धीरे destroy ആകുന്നതാണ്. Iron rusting സാധാരണ example ആണ്. Moisture, oxygen, salts, pollutants, temperature, dissimilar metal contact എന്നിവ corrosion rate വർധിപ്പിക്കും. Strength കുറവ്, leakage, machine failure, contamination, economic loss എന്നിവ ഉണ്ടാകും. Prevention: barrier protection, metallic coating, non-metallic coating, cathodic protection. Paint/grease/polymer coating metal-നെ environment-ൽ നിന്ന് isolate ചെയ്യും. Anodising aluminium-ൽ protective oxide layer ഉണ്ടാക്കുന്നു. Sacrificial anode method-ൽ zinc/magnesium പോലുള്ള active metal protect ചെയ്യേണ്ട metal-നോട് connect ചെയ്യുന്നു; active metal ആദ്യം corrode ചെയ്യും.", "points": ["Corrosion is environmental destruction of metal.", "Factors: moisture, oxygen, salts, temperature, pollutants, dissimilar metals.", "Barrier protection prevents contact.", "Sacrificial anode protects by preferential corrosion."], "examples": ["Rusting of iron bridge.", "Zinc coating on iron by galvanising.", "Magnesium anode protecting underground pipeline."], "applications": ["Pipelines, ships, bridges, boilers, tanks and electrical equipment."], "tips": ["Prevention answer should mention principle, not only names.", "For sacrificial anode, active metal corrodes; protected metal becomes cathode."], "diagram": "corrosion"}]}], "solved": {"m1": [{"title": "de Broglie wavelength of electron", "given": "Mass of electron = 9.1 × 10⁻³¹ kg, velocity = 2.0 × 10⁶ m/s, h = 6.626 × 10⁻³⁴ J s.", "steps": ["λ = h/mv", "λ = 6.626×10⁻³⁴ / (9.1×10⁻³¹ × 2.0×10⁶)", "λ = 3.64 × 10⁻¹⁰ m"], "answer": "de Broglie wavelength = 3.64 × 10⁻¹⁰ m.", "tip": "Keep mass in kg and velocity in m/s."}, {"title": "Electronic configuration of calcium", "given": "Atomic number of Ca = 20.", "steps": ["Fill orbitals in Aufbau order.", "1s² 2s² 2p⁶ 3s² 3p⁶ 4s²", "Shell distribution = 2, 8, 8, 2"], "answer": "Ca: 1s² 2s² 2p⁶ 3s² 3p⁶ 4s².", "tip": "4s fills before 3d for first 20 elements."}, {"title": "Identify bond type", "given": "NaCl, H₂, NH₄⁺ and H₂O.", "steps": ["NaCl: electron transfer.", "H₂: electron sharing.", "NH₄⁺: lone pair donation by NH₃ to H⁺.", "H₂O: hydrogen bonding between molecules."], "answer": "NaCl ionic, H₂ covalent, NH₄⁺ coordinate, H₂O hydrogen bonding.", "tip": "Use formation method to identify bond type."}], "m2": [{"title": "Molarity of NaOH solution", "given": "4 g NaOH dissolved in 500 mL solution. Molar mass NaOH = 40 g/mol.", "steps": ["Moles = 4/40 = 0.1 mol.", "Volume = 500 mL = 0.5 L.", "M = 0.1/0.5 = 0.2 M."], "answer": "Molarity = 0.2 M.", "tip": "Convert mL to L before using formula."}, {"title": "pH calculation", "given": "[H⁺] = 1 × 10⁻⁴ M.", "steps": ["pH = −log[H⁺]", "pH = −log(10⁻⁴)", "pH = 4"], "answer": "pH = 4, so the solution is acidic.", "tip": "10⁻ⁿ concentration gives pH n."}, {"title": "Titration using normality equation", "given": "25 mL of HCl is neutralized by 20 mL of 0.1 N NaOH.", "steps": ["N₁V₁ = N₂V₂", "N(HCl) × 25 = 0.1 × 20", "N(HCl) = 2/25 = 0.08 N"], "answer": "Normality of HCl = 0.08 N.", "tip": "Use same volume unit on both sides."}, {"title": "Hardness reason", "given": "Water sample gives poor lather with soap.", "steps": ["Presence of Ca²⁺/Mg²⁺ ions is suspected.", "These ions react with soap to form insoluble scum.", "Softening removes these ions."], "answer": "Poor lather is due to hardness caused by calcium and magnesium salts.", "tip": "Mention scum formation in answer."}], "m3": [{"title": "Choose material for laboratory beaker", "given": "Beaker must resist sudden heating and cooling.", "steps": ["Thermal shock resistance is required.", "Borosilicate glass has low expansion and good thermal resistance.", "Therefore it is suitable."], "answer": "Borosilicate glass is suitable.", "tip": "Always connect property to application."}, {"title": "Classify polymers", "given": "Polythene, PVC, Nylon-66, Bakelite.", "steps": ["Polythene and PVC are addition polymers.", "Nylon-66 and Bakelite are condensation polymers.", "Polythene/PVC are thermoplastics; Bakelite is thermosetting."], "answer": "Addition: polythene, PVC. Condensation: Nylon-66, Bakelite.", "tip": "Learn examples as pairs."}, {"title": "Nanomaterial classification", "given": "Nanoparticle, nanotube, graphene.", "steps": ["Nanoparticle has all dimensions nanoscale → 0D.", "Nanotube has one extended dimension → 1D.", "Graphene is a sheet → 2D."], "answer": "Nanoparticle: 0D; nanotube: 1D; graphene: 2D.", "tip": "Dimension classification is enough for this syllabus."}], "m4": [{"title": "Faraday law mass deposition", "given": "Current = 2 A, time = 30 min, Z = 0.000329 g/C.", "steps": ["t = 30 × 60 = 1800 s.", "m = ZIt", "m = 0.000329 × 2 × 1800 = 1.1844 g"], "answer": "Mass deposited ≈ 1.18 g.", "tip": "Time must be in seconds."}, {"title": "Daniell cell reactions", "given": "Zn/Zn²⁺ and Cu²⁺/Cu half cells.", "steps": ["At zinc anode: Zn → Zn²⁺ + 2e⁻.", "At copper cathode: Cu²⁺ + 2e⁻ → Cu.", "Overall: Zn + Cu²⁺ → Zn²⁺ + Cu."], "answer": "Zinc is anode, copper is cathode; electrons flow from Zn to Cu.", "tip": "Oxidation at anode, reduction at cathode."}, {"title": "Corrosion prevention selection", "given": "Underground iron pipeline must be protected.", "steps": ["Soil moisture causes electrochemical corrosion.", "Connect a more active metal such as magnesium or zinc.", "The active metal acts as sacrificial anode and corrodes instead."], "answer": "Use cathodic protection by sacrificial anode method.", "tip": "Protected metal behaves as cathode."}]}, "questions": {"m1": [{"q": "Explain Bohr’s atom model. Write its important postulates, merits and demerits.", "a": "Bohr proposed that electrons revolve around the nucleus only in certain permitted circular orbits called stationary states. In these orbits electrons do not radiate energy. Energy is absorbed or emitted only when an electron jumps between two energy levels. The model explains stability of atoms and hydrogen line spectrum. Its limitations are that it cannot explain spectra of multi-electron atoms, fine structure and Zeeman effect."}, {"q": "Define de Broglie wavelength and solve a simple problem using λ = h/mv.", "a": "de Broglie wavelength is the wavelength associated with a moving particle. It is given by λ = h/mv, where h is Planck constant, m is mass and v is velocity. In a problem, convert mass to kg and velocity to m/s, substitute in the formula and write final answer in metre. It shows wave nature of matter, especially microscopic particles."}, {"q": "State Heisenberg’s uncertainty principle and explain its meaning.", "a": "Heisenberg’s uncertainty principle states that it is impossible to determine simultaneously the exact position and exact momentum of a microscopic particle. Mathematically, Δx Δp ≥ h/4π. It means the electron cannot be treated like a particle moving in a fixed path; instead probability and orbitals are used."}, {"q": "Explain quantum numbers and their significance.", "a": "Quantum numbers describe the state of an electron in an atom. Principal quantum number n indicates shell and energy. Azimuthal quantum number l indicates subshell and shape. Magnetic quantum number m indicates orientation of orbital. Spin quantum number s indicates spin direction. Together they help describe electron arrangement in orbitals."}, {"q": "Write Aufbau principle, Pauli exclusion principle and Hund’s rule.", "a": "Aufbau principle: electrons fill lower energy orbitals before higher energy orbitals. Pauli exclusion principle: no two electrons in an atom can have the same set of four quantum numbers; an orbital can hold maximum two electrons with opposite spins. Hund’s rule: degenerate orbitals are singly occupied before pairing occurs."}, {"q": "Write electronic configuration of first 20 elements using examples.", "a": "Electronic configuration is written by filling orbitals in order of increasing energy: 1s, 2s, 2p, 3s, 3p, 4s. Example: Na = 1s²2s²2p⁶3s¹, Cl = 1s²2s²2p⁶3s²3p⁵, Ca = 1s²2s²2p⁶3s²3p⁶4s². Shell configuration may also be written as 2,8,1 for Na and 2,8,8,2 for Ca."}, {"q": "Compare ionic, covalent and coordinate bonds with examples.", "a": "Ionic bond is formed by transfer of electrons, example NaCl. Covalent bond is formed by sharing of electrons, example H₂ and HF. Coordinate bond is formed when one atom donates both electrons of the shared pair, example NH₄⁺. Ionic compounds usually have high melting point; covalent compounds often have lower melting points; coordinate bond behaves like covalent bond after formation."}, {"q": "Explain anomalous behaviour of water due to hydrogen bonding.", "a": "Water molecules form extensive hydrogen bonding because hydrogen is bonded to highly electronegative oxygen. This causes high boiling point, high surface tension, high specific heat and lower density of ice compared to liquid water. These properties are anomalous because H₂O behaves differently from similar hydrides."}], "m2": [{"q": "Define solute, solvent and solution. Explain molarity, normality and ppm.", "a": "A solution is a homogeneous mixture of solute and solvent. Solute is the dissolved substance and solvent is the dissolving medium. Molarity is moles of solute per litre of solution. Normality is gram equivalents of solute per litre of solution. ppm means parts per million and for dilute water solutions it is approximately mg/L. These concentration units are used in titration and water analysis."}, {"q": "Solve a molarity problem from mass and volume.", "a": "Use the method: moles = given mass / molar mass, volume in litre = mL/1000, molarity = moles / volume in litre. Example: 4 g NaOH in 500 mL, molar mass 40 g/mol. Moles = 4/40 = 0.1 mol. Volume = 0.5 L. M = 0.1/0.5 = 0.2 M."}, {"q": "Explain pH, pOH and their relation. Add applications of pH.", "a": "pH = −log[H⁺] and pOH = −log[OH⁻]. At 25°C, pH + pOH = 14. pH below 7 is acidic, pH 7 is neutral and pH above 7 is basic. pH control is important in water treatment, agriculture, medicine, electroplating, boiler water and corrosion prevention."}, {"q": "What is buffer solution? Give one acidic and one basic buffer example.", "a": "A buffer solution resists change in pH when small amounts of acid or base are added. Acidic buffer is made from a weak acid and its salt, for example acetic acid and sodium acetate. Basic buffer is made from a weak base and its salt, for example ammonium hydroxide and ammonium chloride."}, {"q": "Explain volumetric analysis, titration, end point and indicator.", "a": "Volumetric analysis is a quantitative method to find concentration using measured volumes of reacting solutions. Titration is the experimental process. End point is the stage where indicator changes colour showing completion of reaction. Indicator is a substance that shows colour change near the equivalence point. The choice of indicator depends on titration type."}, {"q": "Use normality equation to find unknown concentration.", "a": "At equivalence point, N₁V₁ = N₂V₂. Substitute known normality and volumes using the same volume unit. Example: 25 mL HCl is neutralized by 20 mL 0.1 N NaOH. N(HCl) × 25 = 0.1 × 20, so N(HCl) = 0.08 N."}, {"q": "Explain hardness of water and problems caused in boilers.", "a": "Hardness is due to calcium and magnesium salts in water. Temporary hardness is due to bicarbonates and permanent hardness is due to chlorides and sulphates. Hard water forms scum with soap and does not lather easily. In boilers it produces scale, reduces heat transfer, wastes fuel and causes corrosion."}, {"q": "Explain lime-soda process, ion exchange method and municipal water treatment steps.", "a": "Lime-soda process removes hardness by precipitating calcium and magnesium salts. Ion exchange method uses resins to replace Ca²⁺ and Mg²⁺ ions with Na⁺ or H⁺ ions. Municipal water treatment includes sedimentation, coagulation, filtration and sterilization by chlorination, bleaching powder or UV radiation to produce potable water."}], "m3": [{"q": "What is alloying? Explain purposes of alloying with examples brass, bronze and solder.", "a": "Alloying is the process of mixing two or more elements, at least one metal, to improve properties. It improves strength, hardness, corrosion resistance, melting point and castability. Brass is copper-zinc alloy used in fittings. Bronze is copper-tin alloy used in bearings and statues. Solder is used for joining metals."}, {"q": "Explain types and applications of glasses in engineering.", "a": "Glass is an amorphous inorganic material. Sodium silicate glass is common glass used in windows and containers. Borosilicate glass resists thermal shock and is used in laboratory apparatus. Safety glass reduces injury during breakage and is used in vehicles. Insulating glass reduces heat transfer in buildings."}, {"q": "What are refractory materials? Write characteristics and applications.", "a": "Refractory materials withstand high temperatures without softening or reacting. Important characteristics are high melting point, thermal stability, chemical resistance, mechanical strength and low thermal expansion. Examples include fire clay bricks and silica bricks. They are used in furnaces, kilns, boilers and reactors."}, {"q": "Define monomer, polymer and polymerization. Classify polymers.", "a": "Monomer is a small molecule capable of joining with similar or different molecules. Polymer is a large molecule made of repeating monomer units. Polymerization is the process of forming polymer. Homopolymer is made from one monomer; copolymer from two or more monomers. Addition polymers form without by-product; condensation polymers form with elimination of small molecules."}, {"q": "Explain polythene, PVC, Nylon-66 and Bakelite with monomers and uses.", "a": "Polythene is formed from ethene and is used for films, containers and insulation. PVC is formed from vinyl chloride and used for pipes and cable insulation. Nylon-66 is formed from hexamethylenediamine and adipic acid and used for fibres and machine parts. Bakelite is formed from phenol and formaldehyde and used for switches and electrical fittings."}, {"q": "Compare thermoplastics and thermosetting plastics.", "a": "Thermoplastics soften on heating and harden on cooling, so they can be remoulded; examples are polythene and PVC. Thermosetting plastics harden permanently on heating and cannot be remoulded; examples are Bakelite and melamine. Thermosetting plastics are generally harder and more heat resistant."}, {"q": "Explain natural rubber, vulcanization, Buna-S and Buna-N.", "a": "Natural rubber is a polymer of isoprene and is elastic but weak and temperature sensitive. Vulcanization is heating rubber with sulphur to improve strength, elasticity, durability and resistance. Buna-S is made from butadiene and styrene and used in tyres. Buna-N is made from butadiene and acrylonitrile and is oil resistant."}, {"q": "Define nanomaterials and classify 0D, 1D and 2D with examples and applications.", "a": "Nanomaterials have at least one dimension in the range of about 1–100 nm. 0D nanomaterials include nanoparticles, 1D include nanotubes and nanowires, and 2D include graphene sheets. Carbon nanotubes may be single-walled or multi-walled. Applications include sensors, electronics, coatings, medicine, energy storage and composites."}], "m4": [{"q": "Explain electronic concept of oxidation, reduction and redox reaction with examples.", "a": "Oxidation is loss of electrons and reduction is gain of electrons. A redox reaction involves both processes simultaneously. Example: Zn → Zn²⁺ + 2e⁻ is oxidation and Cu²⁺ + 2e⁻ → Cu is reduction. In the overall reaction Zn + Cu²⁺ → Zn²⁺ + Cu, zinc is oxidized and copper ion is reduced."}, {"q": "Differentiate metallic conductors, electrolytic conductors, electrolytes and non-electrolytes.", "a": "Metallic conductors conduct by movement of electrons and do not undergo chemical change, example copper. Electrolytic conductors conduct by movement of ions and undergo chemical change, example NaCl solution. Electrolytes conduct in molten or aqueous state; strong electrolytes ionize almost completely and weak electrolytes partially. Non-electrolytes like sugar solution do not conduct."}, {"q": "State Faraday’s first and second laws of electrolysis.", "a": "First law: mass deposited or liberated at an electrode is directly proportional to the quantity of electricity passed, m = ZIt. Second law: when the same quantity of electricity passes through different electrolytes, masses deposited are proportional to their equivalent masses. These laws are used in electroplating and refining calculations."}, {"q": "Solve a Faraday law problem for mass deposited.", "a": "Use m = ZIt or m = EIt/F. Convert time to seconds and current to ampere. Example: I = 2 A, t = 30 min = 1800 s, Z = 0.000329 g/C. m = 0.000329 × 2 × 1800 = 1.18 g. Therefore mass deposited is about 1.18 g."}, {"q": "Explain electroplating of nickel on mild steel.", "a": "In nickel plating, the mild steel article is made cathode and pure nickel is made anode. Nickel salt solution is used as electrolyte. On passing current, nickel dissolves from anode as Ni²⁺ and deposits as a thin layer on the steel article at cathode. It improves appearance and corrosion resistance."}, {"q": "Explain electrolytic refining of copper.", "a": "In copper refining, impure copper is the anode, pure copper sheet is the cathode and acidified copper sulphate is the electrolyte. Copper dissolves from anode as Cu²⁺ and deposits as pure copper on cathode. Insoluble impurities collect below the anode as anode mud."}, {"q": "Explain Daniell cell with reactions and function of salt bridge.", "a": "Daniell cell has zinc electrode in zinc sulphate and copper electrode in copper sulphate connected by salt bridge. Zinc acts as anode and undergoes oxidation: Zn → Zn²⁺ + 2e⁻. Copper acts as cathode and undergoes reduction: Cu²⁺ + 2e⁻ → Cu. Electrons flow from zinc to copper. Salt bridge maintains electrical neutrality and completes internal circuit."}, {"q": "Define corrosion, factors affecting corrosion and prevention methods.", "a": "Corrosion is the gradual destruction of metal by chemical or electrochemical reaction with environment. Moisture, oxygen, salts, pollutants, high temperature and contact with dissimilar metals increase corrosion. Prevention methods include barrier protection by paint or grease, metallic coatings, non-metallic coatings such as anodising, anti-rust solutions and cathodic protection by sacrificial anode method."}]}, "first20": [["H", "1", "1s¹", "1"], ["He", "2", "1s²", "2"], ["Li", "3", "1s² 2s¹", "2,1"], ["Be", "4", "1s² 2s²", "2,2"], ["B", "5", "1s² 2s² 2p¹", "2,3"], ["C", "6", "1s² 2s² 2p²", "2,4"], ["N", "7", "1s² 2s² 2p³", "2,5"], ["O", "8", "1s² 2s² 2p⁴", "2,6"], ["F", "9", "1s² 2s² 2p⁵", "2,7"], ["Ne", "10", "1s² 2s² 2p⁶", "2,8"], ["Na", "11", "1s² 2s² 2p⁶ 3s¹", "2,8,1"], ["Mg", "12", "1s² 2s² 2p⁶ 3s²", "2,8,2"], ["Al", "13", "1s² 2s² 2p⁶ 3s² 3p¹", "2,8,3"], ["Si", "14", "1s² 2s² 2p⁶ 3s² 3p²", "2,8,4"], ["P", "15", "1s² 2s² 2p⁶ 3s² 3p³", "2,8,5"], ["S", "16", "1s² 2s² 2p⁶ 3s² 3p⁴", "2,8,6"], ["Cl", "17", "1s² 2s² 2p⁶ 3s² 3p⁵", "2,8,7"], ["Ar", "18", "1s² 2s² 2p⁶ 3s² 3p⁶", "2,8,8"], ["K", "19", "1s² 2s² 2p⁶ 3s² 3p⁶ 4s¹", "2,8,8,1"], ["Ca", "20", "1s² 2s² 2p⁶ 3s² 3p⁶ 4s²", "2,8,8,2"]], "revision": {"study_tricks": ["Bond answer trick: Formation → electron transfer/sharing → example → property.", "Molarity trick: gram ÷ molar mass ÷ litre.", "pH trick: [H⁺] = 10⁻ⁿ gives pH = n.", "Electrolysis trick: mass deposited increases when current or time increases.", "Corrosion answer trick: definition → factors → damage → prevention principle."], "common_mistakes": ["Using volume in mL directly in molarity formula.", "Writing pH high means more acidic; actually lower pH means more acidic.", "Confusing ionic and covalent bond examples.", "Forgetting time conversion from minutes to seconds in Faraday problems.", "Writing only names of water treatment steps without purpose.", "Interchanging anode and cathode in electroplating and Daniell cell."], "exam_templates": [{"name": "5-mark theory answer", "steps": ["Definition", "Principle or working", "Labelled sketch/table where needed", "Example", "Application / advantage / limitation"]}, {"name": "Numerical answer", "steps": ["Given data with units", "Formula", "Substitution", "Calculation", "Final answer with unit"]}, {"name": "Material comparison answer", "steps": ["Composition or structure", "Important properties", "Two examples", "Engineering applications", "One limitation if asked"]}]}}</script>

 if(type==='wave') return `<svg viewBox="0 0 520 330" role="img" aria-label="Animated de Broglie matter wave diagram"><rect x="10" y="10" width="500" height="310" rx="28" fill="#f0f9ff"/><text x="40" y="52" font-weight="900" fill="#075985">de Broglie matter wave</text><path d="M60 165 C95 90 130 240 165 165 C200 90 235 240 270 165 C305 90 340 240 375 165 C410 90 445 240 480 165" fill="none" stroke="#0284c7" stroke-width="7" opacity=".3"/><path class="flow-dash-slow" d="M60 165 C95 90 130 240 165 165 C200 90 235 240 270 165 C305 90 340 240 375 165 C410 90 445 240 480 165" fill="none" stroke="#0284c7" stroke-width="4"/><circle class="pulse-soft" cx="80" cy="165" r="12" fill="#f97316"/><circle class="pulse-soft pulse-delay" cx="270" cy="165" r="12" fill="#f97316"/><text x="260" y="270" text-anchor="middle" fill="#334155">Higher momentum → smaller wavelength</text><text x="260" y="295" text-anchor="middle" font-weight="900" fill="#075985">λ = h / mv</text></svg>`;
 if(type==='orbitals') return `<svg viewBox="0 0 520 330" role="img" aria-label="Animated orbital shapes"><rect x="10" y="10" width="500" height="310" rx="28" fill="#f8fafc"/><text x="40" y="52" font-weight="900" fill="#075985">Orbitals and probability regions</text><circle class="pulse-soft" cx="140" cy="165" r="66" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/><text x="140" y="170" text-anchor="middle" font-weight="900" fill="#075985">s orbital</text><g><ellipse cx="330" cy="140" rx="42" ry="74" fill="#ddd6fe" stroke="#7c3aed" stroke-width="3"/><ellipse cx="330" cy="190" rx="42" ry="74" fill="#ddd6fe" stroke="#7c3aed" stroke-width="3"/><circle cx="330" cy="165" r="8" fill="#111827"/><animateTransform attributeName="transform" type="rotate" from="-8 330 165" to="8 330 165" dur="2.6s" repeatCount="indefinite" additive="sum"/></g><text x="330" y="285" text-anchor="middle" fill="#334155">p orbital has two lobes</text><text x="140" y="285" text-anchor="middle" fill="#334155">maximum probability region</text></svg>`;
 if(type==='bond') return `<svg viewBox="0 0 560 330" role="img" aria-label="Animated chemical bonding diagram"><rect x="10" y="10" width="540" height="310" rx="28" fill="#fff7ed"/><text x="40" y="52" font-weight="900" fill="#9a3412">Ionic and covalent bonding</text><circle cx="145" cy="155" r="55" fill="#fed7aa" stroke="#ea580c" stroke-width="3"/><circle cx="270" cy="155" r="55" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/><text x="145" y="160" text-anchor="middle" font-weight="900">Na</text><text x="270" y="160" text-anchor="middle" font-weight="900">Cl</text><path class="flow-dash" d="M185 120 C212 90 242 90 260 120" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#bondArr)"/><circle class="pulse-soft" cx="204" cy="103" r="7" fill="#dc2626"/><text x="205" y="82" text-anchor="middle" fill="#991b1b">electron transfer</text><circle cx="420" cy="138" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><circle cx="465" cy="138" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><circle class="pulse-soft" cx="435" cy="138" r="7" fill="#111827"/><circle class="pulse-soft pulse-delay" cx="452" cy="138" r="7" fill="#111827"/><text x="442" y="220" text-anchor="middle" fill="#334155">shared electron pair</text><defs><marker id="bondArr" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#dc2626"/></marker></defs></svg>`;
 if(type==='solution') return `<svg viewBox="0 0 520 330" role="img" aria-label="Animated solution concentration diagram"><rect x="10" y="10" width="500" height="310" rx="28" fill="#ecfeff"/><text x="40" y="52" font-weight="900" fill="#0e7490">Solution concentration</text><path d="M165 80 H355 L330 255 H190 Z" fill="#cffafe" stroke="#0891b2" stroke-width="4"/><line x1="180" y1="145" x2="340" y2="145" stroke="#0891b2" stroke-width="3" opacity=".45"/><circle class="float-up" cx="215" cy="220" r="9" fill="#0ea5e9"/><circle class="float-up float-delay" cx="285" cy="230" r="8" fill="#06b6d4"/><circle class="float-up" cx="315" cy="205" r="6" fill="#0284c7"/><circle class="float-up float-delay" cx="245" cy="188" r="7" fill="#0ea5e9"/><text x="260" y="288" text-anchor="middle" font-weight="900" fill="#075985">M = moles / litre</text><text x="260" y="112" text-anchor="middle" fill="#334155">solute particles dispersed in solvent</text></svg>`;
 if(type==='ph') return `<svg viewBox="0 0 520 330" role="img" aria-label="Animated pH scale diagram"><rect x="10" y="10" width="500" height="310" rx="28" fill="#f8fafc"/><text x="40" y="52" font-weight="900" fill="#075985">pH scale</text><defs><linearGradient id="phg" x1="0" x2="1"><stop offset="0" stop-color="#dc2626"/><stop offset=".5" stop-color="#22c55e"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs><rect x="60" y="135" width="400" height="46" rx="23" fill="url(#phg)"/><g class="pulse-soft"><polygon points="170,112 155,135 185,135" fill="#111827"/><text x="170" y="100" text-anchor="middle" font-weight="900" fill="#111827">acid</text></g><g class="pulse-soft pulse-delay"><polygon points="345,204 330,181 360,181" fill="#111827"/><text x="345" y="232" text-anchor="middle" font-weight="900" fill="#111827">base</text></g><text x="65" y="205" fill="#991b1b">0</text><text x="255" y="205" fill="#166534">7 neutral</text><text x="445" y="205" fill="#1d4ed8">14</text><text x="260" y="285" text-anchor="middle" font-weight="900" fill="#075985">pH = −log₁₀[H⁺]</text></svg>`;
 if(type==='titration') return `<svg viewBox="0 0 520 360" role="img" aria-label="Animated titration setup diagram"><rect x="10" y="10" width="500" height="340" rx="28" fill="#fff7ed"/><text x="40" y="52" font-weight="900" fill="#9a3412">Acid-base titration</text><rect x="240" y="64" width="38" height="175" rx="10" fill="#fef3c7" stroke="#92400e" stroke-width="3"/><line x1="259" y1="238" x2="259" y2="266" stroke="#92400e" stroke-width="4"/><g><circle cx="259" cy="265" r="8" fill="#0ea5e9"><animate attributeName="cy" values="240;292;240" dur="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;.1;1" dur="1.6s" repeatCount="indefinite"/></circle></g><path d="M185 298 C210 230 310 230 335 298 Z" fill="#fce7f3" stroke="#be185d" stroke-width="4"/><path class="grow-layer" d="M201 285 C225 250 296 250 320 285 Z" fill="#f9a8d4" opacity=".75"/><text x="260" y="328" text-anchor="middle" fill="#334155">Endpoint colour change appears near equivalence point</text><text x="390" y="160" fill="#334155">burette</text><path class="shake-drop" d="M130 260 l-18 25 h36 z" fill="#e2e8f0" stroke="#475569"/></svg>`;
 if(type==='water') return `<svg viewBox="0 0 580 360" role="img" aria-label="Animated water treatment process"><rect x="10" y="10" width="560" height="340" rx="28" fill="#eff6ff"/><text x="40" y="52" font-weight="900" fill="#075985">Water treatment sequence</text><g><rect x="45" y="130" width="95" height="100" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><text x="92" y="185" text-anchor="middle" font-weight="800">raw</text></g><path class="flow-dash" d="M145 180 H220" stroke="#075985" stroke-width="4"/><rect x="225" y="130" width="115" height="100" rx="18" fill="#cffafe" stroke="#0891b2" stroke-width="3"/><text x="282" y="170" text-anchor="middle" font-weight="800">coagulation</text><circle class="float-up" cx="260" cy="210" r="5" fill="#64748b"/><circle class="float-up float-delay" cx="302" cy="212" r="6" fill="#64748b"/><path class="flow-dash" d="M345 180 H410" stroke="#075985" stroke-width="4"/><rect x="415" y="130" width="115" height="100" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="472" y="170" text-anchor="middle" font-weight="800">filtered</text><circle class="pulse-soft" cx="448" cy="205" r="6" fill="#22c55e"/><circle class="pulse-soft pulse-delay" cx="497" cy="207" r="6" fill="#22c55e"/><text x="290" y="294" text-anchor="middle" fill="#334155">softening / filtration / disinfection remove hardness and impurities</text></svg>`;
 if(type==='materials') return `<svg viewBox="0 0 520 330" role="img" aria-label="Engineering materials overview"><rect x="10" y="10" width="500" height="310" rx="28" fill="#f8fafc"/><text x="40" y="52" font-weight="900" fill="#075985">Engineering materials</text><rect class="pulse-soft" x="70" y="105" width="115" height="95" rx="18" fill="#dbeafe"/><text x="128" y="155" text-anchor="middle" font-weight="900">Cement</text><rect class="pulse-soft pulse-delay" x="205" y="105" width="115" height="95" rx="18" fill="#dcfce7"/><text x="262" y="155" text-anchor="middle" font-weight="900">Glass</text><rect class="pulse-soft" x="340" y="105" width="115" height="95" rx="18" fill="#fee2e2"/><text x="398" y="155" text-anchor="middle" font-weight="900">Ceramic</text><path class="flow-dash-slow" d="M105 240 H420" stroke="#0f766e" stroke-width="4"/><text x="260" y="280" text-anchor="middle" fill="#334155">selection depends on property + application</text></svg>`;
 if(type==='polymer') return `<svg viewBox="0 0 560 330" role="img" aria-label="Animated polymer chain diagram"><rect x="10" y="10" width="540" height="310" rx="28" fill="#f0fdfa"/><text x="40" y="52" font-weight="900" fill="#0f766e">Polymer chain</text><path d="M70 170 C115 115 165 225 210 170 C255 115 305 225 350 170 C395 115 445 225 490 170" fill="none" stroke="#0f766e" stroke-width="7" opacity=".35"/><path class="flow-dash-slow" d="M70 170 C115 115 165 225 210 170 C255 115 305 225 350 170 C395 115 445 225 490 170" fill="none" stroke="#0f766e" stroke-width="4"/><circle class="pulse-soft" cx="110" cy="145" r="14" fill="#14b8a6"/><circle class="pulse-soft pulse-delay" cx="210" cy="170" r="14" fill="#14b8a6"/><circle class="pulse-soft" cx="350" cy="170" r="14" fill="#14b8a6"/><circle class="pulse-soft pulse-delay" cx="455" cy="145" r="14" fill="#14b8a6"/><text x="280" y="270" text-anchor="middle" fill="#334155">repeating monomer units form long chains</text></svg>`;

 if(type==='corrosion') return `<svg viewBox="0 0 520 330" role="img" aria-label="Animated corrosion protection diagram"><rect x="10" y="10" width="500" height="310" rx="28" fill="#fff7ed"/><text x="40" y="52" font-weight="900" fill="#9a3412">Corrosion protection</text><rect x="105" y="150" width="300" height="42" rx="12" fill="#64748b"/><text x="255" y="178" text-anchor="middle" fill="white" font-weight="900">iron pipeline</text><circle class="rust-spot" cx="150" cy="148" r="13" fill="#c2410c"/><circle class="rust-spot pulse-delay" cx="215" cy="147" r="9" fill="#c2410c"/><rect x="220" y="220" width="72" height="46" rx="10" fill="#f97316"/><text x="256" y="249" text-anchor="middle" fill="white" font-weight="900">Mg/Zn</text><path d="M256 220 V192" stroke="#111827" stroke-width="4"/><path class="flow-dash" d="M292 243 C360 230 388 205 406 178" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#corarr)"/><text x="70" y="102" fill="#334155">Sacrificial anode corrodes first; pipeline becomes cathode.</text><text x="350" y="280" fill="#dc2626" font-weight="900">active metal protects</text><defs><marker id="corarr" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#dc2626"/></marker></defs></svg>`;
 return `<svg viewBox="0 0 520 330"><rect x="10" y="10" width="500" height="310" rx="28" fill="#f8fafc"/><text x="260" y="165" text-anchor="middle" fill="#334155">Applied Chemistry</text></svg>`;
}
function hero() {return `<section class="hero screen"><div class="hero-card"><div class="hero-content"><span class="pill">${esc(data.subtitle)}</span><h1>${esc(data.title)}<br>Downloadable Notes</h1><p>Student-friendly digital textbook + workbook + revision guide + answer key. Content is built from the official 1004 syllabus: atomic structure, chemical bonding, analytical chemistry, water treatment, engineering materials, electrochemistry and corrosion.</p><div class="hero-actions"><button class="btn btn-primary" onclick="selectSection('m1')">Start Module 1</button><button class="btn btn-ghost" onclick="selectSection('formula')">Open Formula Bank</button><button class="btn btn-ghost" onclick="selectSection('answer-key')">Answer Key</button></div><div class="stats"><div class="stat"><b>1004</b><span>Subject code</span></div><div class="stat"><b>${esc(data.credits)}</b><span>Credits</span></div><div class="stat"><b>45</b><span>Periods</span></div></div></div><div class="hero-side"><div class="side-card"><div class="side-head"><strong>Mini Formula Bank</strong><span class="badge">Chemistry</span></div><div class="formula-mini"><div class="mini"><code>λ = h/mv</code><small>de Broglie</small></div><div class="mini"><code>pH = −log[H⁺]</code><small>Acidity</small></div><div class="mini"><code>N₁V₁=N₂V₂</code><small>Titration</small></div><div class="mini"><code>m = ZIt</code><small>Electrolysis</small></div></div></div><div class="side-card"><div class="side-head"><strong>How to write answers</strong><span class="badge">Exam friendly</span></div><ol class="note-list"><li>Write definition in the first line.</li><li>Add principle / equation / labelled diagram where needed.</li><li>Explain one real engineering application.</li><li>For numericals: Given → Formula → Substitution → Answer.</li></ol></div></div></div></section>`}
function overview() {
 return `${hero()}<section class="section screen"><div class="section-head"><div><h2>Course Overview</h2><p>${esc(data.overview)}</p></div></div><div class="grid"><article class="card col-6"><span class="badge">Course objectives</span>${list(data.objectives)}</article><article class="card col-6"><span class="badge">Course outcomes</span><div class="table-wrap"><table><thead><tr><th>CO</th><th>Outcome</th><th>Hours</th><th>Level</th></tr></thead><tbody>${data.outcomes.map(o=>`<tr><td><b>${esc(o.co)}</b></td><td>${esc(o.text)}</td><td>${esc(o.hours)}</td><td>${esc(o.level)}</td></tr>`).join('')}</tbody></table></div></article><article class="card col-12"><span class="badge">Module map</span><div class="map-grid" style="margin-top:1rem">${data.modules.map((m,i)=>`<button class="map-card" style="--accent:${accent[m.id]};text-align:left;cursor:pointer" onclick="selectSection('${m.id}')"><span class="badge">Module ${i+1} • ${esc(m.co)} • ${esc(m.hours)} hrs</span><h3>${esc(m.name)}</h3><p>${esc(m.intro)}</p><p class="mal">${esc(m.mal)}</p></button>`).join('')}</div></article><article class="card col-4"><span class="badge">Daily study method</span><ol class="note-list"><li>Read one lesson slowly.</li><li>Copy formulas with symbol meaning and units.</li><li>Redraw the chemistry sketch.</li><li>Solve one numerical or example.</li><li>Check answer key after trying.</li></ol></article><article class="card col-4"><span class="badge">Numerical format</span><ol class="note-list"><li>Given data with units.</li><li>Formula used.</li><li>Unit conversion.</li><li>Substitution and calculation.</li><li>Final answer with unit.</li></ol></article><article class="card col-4"><span class="badge">Long answer format</span><ol class="note-list"><li>Definition.</li><li>Principle/working.</li><li>Labelled diagram or table.</li><li>Example.</li><li>Application / advantage / limitation.</li></ol></article></div></section>${footer()}`;
}
function formulaBank() { return `<section class="section screen"><div class="section-head"><div><h2>Mini Formula Bank</h2><p>Only chemistry formulas from Applied Chemistry-I are included here. Use this for numericals, titration, pH and electrochemistry problems.</p></div></div><input id="bankSearch" class="search" placeholder="Search formula, topic or use..." oninput="filterBank(this.value)"><div id="bankGrid" class="bank-grid">${data.formulas.map(f=>formulaCard(f)).join('')}</div></section>${footer()}`; }
function formulaCard(f) { return `<article class="bank-card" data-search="${esc((f.name+' '+f.formula+' '+f.use).toLowerCase())}"><span class="badge">${esc(f.name)}</span><code>${esc(f.formula)}</code><p><b>Symbols:</b> ${esc(f.where)}</p><p><b>Use:</b> ${esc(f.use)}</p><p class="chem-note"><b>Careful:</b> ${esc(f.care)}</p></article>`; }
function filterBank(q) { q=String(q).toLowerCase(); document.querySelectorAll('.bank-card').forEach(c=>c.style.display=c.dataset.search.includes(q)?'block':'none'); }
function modulePage(id) { const m=data.modules.find(x=>x.id===id); const idx=data.modules.findIndex(x=>x.id===id)+1; return `<section class="section screen"><div class="module-hero" style="--accent:${accent[id]}"><span class="pill">Module ${idx} • ${esc(m.co)} • ${esc(m.hours)} hours</span><h2>${esc(m.name)}</h2><p>${esc(m.intro)}</p><p class="mal">${esc(m.mal)}</p></div>${m.lessons.map(lessonCard).join('')}${solvedBlock(id)}${expectedQuestions(id)}${id==='m1'?first20Table():''}</section>${footer()}`; }
function lessonCard(l) {return `<article class="lesson-card"><div class="lesson-title"><span class="lesson-code">${esc(l.code)}</span><h3>${esc(l.title)}</h3></div><div class="two-col"><div><div class="explain"><h4>English explanation</h4><p>${esc(l.english)}</p></div><div class="explain mal" style="margin-top:1rem"><h4>Malayalam support</h4><p>${esc(l.malayalam)}</p></div></div><div class="diagram">${svg(l.diagram)}</div></div><div class="subgrid"><div class="info-box"><h4>Important points</h4>${list(l.points)}</div><div class="info-box"><h4>Examples</h4>${list(l.examples)}</div><div class="info-box"><h4>Applications</h4>${list(l.applications)}</div></div><div class="chem-note"><b>Study tricks / exam tips:</b>${list(l.tips)}</div></article>`}
function solvedBlock(id) { const arr=data.solved[id]||[]; return `<div class="section-head" style="margin-top:2rem"><div><h2>Solved Examples</h2><p>Worked examples are included in the module itself. Master Answer Key contains answers for expected questions.</p></div></div><div class="problems">${arr.map(p=>`<article class="problem"><h4>${esc(p.title)}</h4><div class="step"><b>Given:</b> ${esc(p.given)}</div>${p.steps.map(s=>`<div class="step">${esc(s)}</div>`).join('')}<div class="step answer">${esc(p.answer)}</div><div class="step warn"><b>Common mistake:</b> ${esc(p.tip)}</div></article>`).join('')}</div>`; }
function expectedQuestions(id) { const qs=data.questions[id]||[]; return `<div class="section-head" style="margin-top:2rem"><div><h2>Expected Questions</h2><p>Questions only are shown here. Full answers are available in Master Answer Key.</p></div></div><div class="q-list">${qs.map((x,i)=>`<div class="q-item"><span class="qno">Q${i+1}</span><div>${esc(x.q)}</div></div>`).join('')}</div>`; }
function first20Table() { return `<div class="section-head" style="margin-top:2rem"><div><h2>Electronic Configuration of First 20 Elements</h2><p>Useful for M1.03 electronic configuration practice.</p></div></div><div class="table-wrap"><table><thead><tr><th>Element</th><th>Atomic No.</th><th>Orbital configuration</th><th>Shell distribution</th></tr></thead><tbody>${data.first20.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>` }
function revision() { return `<section class="section screen"><div class="section-head"><div><h2>Quick Revision Sheet</h2><p>Last-minute checklist, study tricks and common mistakes for Applied Chemistry-I.</p></div></div><div class="revision-grid"><article class="card"><span class="badge">Study tricks</span>${list(data.revision.study_tricks)}</article><article class="card"><span class="badge">Common mistakes</span>${list(data.revision.common_mistakes)}</article><article class="card"><span class="badge">Before exam</span><ul class="note-list"><li>Can I write all formula-bank equations?</li><li>Can I draw Daniell cell and titration setup?</li><li>Can I solve one pH, molarity and Faraday problem?</li><li>Can I explain water treatment in order?</li><li>Can I compare thermoplastic and thermosetting plastics?</li></ul></article></div><div class="section-head" style="margin-top:2rem"><div><h2>Answer Writing Templates</h2><p>Use these formats to make answers look like a textbook response.</p></div></div><div class="revision-grid">${data.revision.exam_templates.map(t=>`<article class="template-card"><h3>${esc(t.name)}</h3><ol class="note-list">${t.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol></article>`).join('')}</div></section>${footer()}`; }
function answerKey() { return `<section class="section screen"><div class="section-head"><div><h2>Final Master Answer Key</h2><p>These model answers match exactly with the Expected Questions inside each module.</p></div></div>${data.modules.map((m,mi)=>`<div class="module-hero" style="--accent:${accent[m.id]};margin-top:1.4rem"><span class="pill">Module ${mi+1} Answer Key</span><h2>${esc(m.name)}</h2></div><div class="answer-grid">${(data.questions[m.id]||[]).map((qa,i)=>`<article class="answer-card"><span class="badge">Module ${mi+1} • Q${i+1}</span><h3>${esc(qa.q)}</h3><p>${esc(qa.a)}</p></article>`).join('')}</div>`).join('')}</section>${footer()}`; }
function footer() { return `<footer class="footer screen"><div class="footer-card"><strong>${esc(data.title)} ${esc(data.code)} • Downloadable HTML Notes</strong><span>Author: Nandakumar.M • visit: nandakumarm.dpdns.org</span></div></footer>`; }
function render(section, target=app) {
 if(section==='overview') target.innerHTML=overview();
 else if(section==='formula') target.innerHTML=formulaBank();
 else if(section==='revision') target.innerHTML=revision();
 else if(section==='answer-key') target.innerHTML=answerKey();
 else target.innerHTML=modulePage(section);
 window.scrollTo({top:0,behavior:'smooth'});
}
function selectSection(section) { active=section; document.querySelectorAll('.tabbtn').forEach(b=>b.classList.toggle('active', b.dataset.target===section)); render(section); }
document.querySelectorAll('.tabbtn').forEach(btn=>btn.addEventListener('click',()=>selectSection(btn.dataset.target)));
function renderPrint() { printRoot.innerHTML = overview() + formulaBank() + modulePage('m1') + modulePage('m2') + modulePage('m3') + modulePage('m4') + revision() + answerKey(); }
document.getElementById('downloadPdf').addEventListener('click',()=>{ renderPrint(); setTimeout(()=>window.print(),250); });
window.addEventListener('afterprint',()=>{ printRoot.innerHTML=''; });
window.addEventListener('scroll',()=>{ const h=document.documentElement; document.getElementById('progress').style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight)*100)+'%'; document.getElementById('toTop').classList.toggle('show', h.scrollTop>500); });
document.getElementById('toTop').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
render('overview');
</script>
</body>
</html>

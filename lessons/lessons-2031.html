<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Fundamentals of Electrical and Electronics Engineering — Course 2031">
<title>lessons-2031 | Fundamentals of Electrical and Electronics Engineering</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f8fb;color:#0f172a;font-family:Segoe UI,Arial,sans-serif}.loading{text-align:center;padding:2rem}.spinner{width:44px;height:44px;margin:0 auto 1rem;border:4px solid #d7e2ef;border-top-color:#0b4f6c;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<main class="loading"><div class="spinner"></div><strong>Loading handbook…</strong></main>
<script>
(async()=>{
  try{
    const source='https://raw.githubusercontent.com/nandurpm/diploma-notes/632a33502f1408d7e0fb866a8f671f6956142dc5/lessons/lessons-2031.html';
    const response=await fetch(source,{cache:'no-store'});
    if(!response.ok) throw new Error('Unable to load handbook source');
    let html=await response.text();
    const layoutFix=`
<style id="full-width-navigation-fix">
html,body{width:100%!important;max-width:none!important;overflow-x:hidden!important}
.wrap{width:100%!important;max-width:none!important;margin:0!important;padding-left:clamp(5px,.55vw,11px)!important;padding-right:clamp(5px,.55vw,11px)!important}
.top{width:100%!important}
.nav{width:100%!important;max-width:none!important;margin:0!important;padding:.52rem clamp(5px,.55vw,11px)!important;display:flex!important;flex-wrap:wrap!important;align-items:center!important;justify-content:flex-start!important;gap:.38rem!important;overflow:visible!important}
.logo{flex:0 0 48px!important;min-width:48px!important;height:48px!important}
.brand{flex:0 1 360px!important;min-width:220px!important;white-space:normal!important;line-height:1.12!important}
.nav a,.btn{flex:0 0 auto!important;font-size:.77rem!important;line-height:1!important;padding:.52rem .66rem!important}
.btn{margin-left:0!important}
.hero{padding:.62rem 0!important;gap:.7rem!important}
.sec{margin:.7rem 0!important}
section[id]{scroll-margin-top:132px!important}
@media(max-width:1599px){
 .brand{flex:1 1 calc(100% - 62px)!important;min-width:0!important}
 .nav a,.btn{font-size:.75rem!important;padding:.49rem .61rem!important}
}
@media(max-width:760px){
 .wrap{padding-left:4px!important;padding-right:4px!important}
 .nav{padding:.42rem 4px!important;gap:.3rem!important}
 .logo{flex-basis:44px!important;min-width:44px!important;height:44px!important;border-radius:13px!important}
 .brand{font-size:.88rem!important}
 .nav a,.btn{font-size:.7rem!important;padding:.43rem .52rem!important}
 section[id]{scroll-margin-top:175px!important}
}
@media print{
 .wrap{padding:0!important}
 section[id]{scroll-margin-top:0!important}
}
</style>`;
    html=html.replace('</head>',layoutFix+'\n</head>');
    document.open();
    document.write(html);
    document.close();
    if(location.hash){setTimeout(()=>document.getElementById(location.hash.slice(1))?.scrollIntoView(),80)}
  }catch(error){
    document.body.innerHTML='<main style="max-width:760px;padding:2rem"><h1>Unable to load the handbook</h1><p>Please check the internet connection and reload the page.</p></main>';
  }
})();
</script>
</body>
</html>

name: Update notice and Help assistant

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-notice-and-help-assistant.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch shared site JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('assets/js/main.js')
          text = path.read_text(encoding='utf-8')

          old_notice = '''function setupSiteNotice() {
  if (document.querySelector(".site-notice")) return;
  const brand = document.querySelector(".topbar .brand");
  if (!brand) return;
  const notice = document.createElement("a");
  notice.className = "site-notice";
  notice.href = "https://nandakumarm.dpdns.org/about.html#contact";
  notice.target = "_blank";
  notice.rel = "noopener";
  notice.textContent = "This website is in its initial stage. For suggestions or content changes, contact the developer.";
  brand.insertAdjacentElement("afterend", notice);
}'''

          new_notice = '''function setupSiteNotice() {
  if (document.querySelector(".site-notice")) return;
  const brand = document.querySelector(".topbar .brand");
  if (!brand) return;

  if (!document.getElementById("siteNoticeMarqueeStyles")) {
    const style = document.createElement("style");
    style.id = "siteNoticeMarqueeStyles";
    style.textContent = `
      .topbar .site-notice {
        flex: 1 1 260px;
        min-width: 120px;
        max-width: 100%;
        overflow: hidden;
        white-space: nowrap;
        display: block;
        position: relative;
        text-decoration: none;
      }
      .topbar .site-notice-track {
        display: inline-block;
        min-width: max-content;
        padding-left: 100%;
        will-change: transform;
        animation: siteNoticeScroll 19s linear infinite;
      }
      .topbar .site-notice:hover .site-notice-track,
      .topbar .site-notice:focus-visible .site-notice-track {
        animation-play-state: paused;
      }
      @keyframes siteNoticeScroll {
        from { transform: translateX(0); }
        to { transform: translateX(-100%); }
      }
      @media (max-width: 760px) {
        .topbar .site-notice { order: 3; flex-basis: 100%; width: 100%; }
        .topbar .site-notice-track { animation-duration: 15s; }
      }
    `;
    document.head.append(style);
  }

  const notice = document.createElement("a");
  notice.className = "site-notice";
  notice.href = "https://nandakumarm.dpdns.org/about.html#contact";
  notice.target = "_blank";
  notice.rel = "noopener";
  notice.setAttribute("aria-label", "Contact the developer for suggestions or content changes");

  const track = document.createElement("span");
  track.className = "site-notice-track";
  track.textContent = "This website is in its initial stage. For suggestions or content changes, contact the developer.";
  notice.append(track);
  brand.insertAdjacentElement("afterend", notice);
}'''

          if old_notice not in text:
            raise SystemExit('setupSiteNotice block not found')
          text = text.replace(old_notice, new_notice, 1)

          old_assistant = '''function setupSiteAssistant() {
  if (window.location.pathname.includes("/lessons/") || document.querySelector(".poly-ai-button")) return;

  const prefix = rootPrefix();'''

          new_assistant = '''function setupSiteAssistant() {
  const assistantPath = window.location.pathname.toLowerCase().replace(/\\/+$/, "");
  if (assistantPath.includes("/lessons/") || assistantPath.endsWith("/contact.html")) {
    document.getElementById("polySiteAssistant")?.remove();
    return;
  }
  if (document.querySelector(".poly-ai-button")) return;

  const prefix = rootPrefix();'''

          if old_assistant not in text:
            raise SystemExit('setupSiteAssistant block not found')
          text = text.replace(old_assistant, new_assistant, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/update-notice-and-help-assistant.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/main.js .github/workflows/update-notice-and-help-assistant.yml
          git commit -m "Scroll the site notice and remove Ask POLY from Help"
          git push origin main

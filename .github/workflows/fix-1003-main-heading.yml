name: Use a primary heading on Applied Physics-I page

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-1003-main-heading.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Correct the main heading level
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lessons/lessons-1003.html")
          text = path.read_text(encoding="utf-8")

          old_selector = '.hero-mini h2 { margin:.8rem 0 .5rem; font-size:clamp(2rem,5vw,4.2rem); letter-spacing:-.065em; line-height:.95; }'
          new_selector = '.hero-mini h1 { margin:.8rem 0 .5rem; font-size:clamp(2rem,5vw,4.2rem); letter-spacing:-.065em; line-height:.95; }'
          old_heading = '<h2>Applied Physics-I<br>Downloadable Notes</h2>'
          new_heading = '<h1>Applied Physics-I<br>Downloadable Notes</h1>'

          if old_selector not in text:
              raise SystemExit("Expected .hero-mini h2 selector was not found")
          if old_heading not in text:
              raise SystemExit("Expected Applied Physics-I h2 heading was not found")

          text = text.replace(old_selector, new_selector, 1)
          text = text.replace(old_heading, new_heading, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-1003-main-heading.yml

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lessons-1003.html .github/workflows/fix-1003-main-heading.yml
          git commit -m "Use h1 for Applied Physics-I page title"
          git push

name: Fix Update notice redirect

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-update-redirect.yml

permissions:
  contents: write

jobs:
  fix-redirect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Use same-tab navigation for the Update notice
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('assets/js/main.js')
          text = path.read_text(encoding='utf-8')
          text = text.replace('  notice.target = "_blank";\n  notice.rel = "noopener";\n', '')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/fix-update-redirect.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Redirect the Update notice to the developer page"
          git push origin main

name: Standardize Analog and Digital Circuits page title

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-3031-title-branding.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update browser and Open Graph titles
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lessons/lessons-3031.html")
          text = path.read_text(encoding="utf-8")

          old_title = "<title>3031 – Analog & Digital Circuits | Handbook</title>"
          new_title = "<title>Analog & Digital Circuits 3031 | Kerala Polytechnic Study Hub</title>"
          old_og = '<meta property="og:title" content="3031 – Analog &amp; Digital Circuits | Handbook">'
          new_og = '<meta property="og:title" content="Analog &amp; Digital Circuits 3031 | Kerala Polytechnic Study Hub">'

          if old_title not in text:
              raise SystemExit("Expected old browser title was not found")
          if old_og not in text:
              raise SystemExit("Expected old Open Graph title was not found")

          text = text.replace(old_title, new_title, 1)
          text = text.replace(old_og, new_og, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-3031-title-branding.yml

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lessons-3031.html .github/workflows/fix-3031-title-branding.yml
          git commit -m "Standardize Analog and Digital Circuits page title"
          git push

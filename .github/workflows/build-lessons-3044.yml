name: Build lessons-3044 handbook

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-lessons-3044.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Assemble standalone handbook
        run: |
          mkdir -p lessons
          cat tmp/lessons-3044-raw/*.part > lessons/lessons-3044.html
          test -s lessons/lessons-3044.html
          grep -q '<title>lessons-3044 | Digital Electronics</title>' lessons/lessons-3044.html
          grep -q 'Complete Model Answers' lessons/lessons-3044.html

      - name: Remove temporary files
        run: |
          rm -rf tmp/lessons-3044 tmp/lessons-3044-raw
          rm -f .github/workflows/build-lessons-3044.yml

      - name: Commit generated handbook
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add complete lessons-3044 Digital Electronics handbook'
          git push origin main

name: Switch department semester layout to v2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/switch-department-semester-layout-v2.yml"

permissions:
  contents: write

jobs:
  switch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update all Revision 2021 department pages
        run: |
          python - <<'PY'
          from pathlib import Path

          changed = 0
          for path in Path('revision-2021').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              if 'data-revision="2021"' not in text or 'data-department=' not in text:
                  continue
              updated = text.replace(
                  '/assets/js/department-semester-layout.js?v=20260612-1',
                  '/assets/js/department-semester-layout-v2.js?v=20260612-2'
              )
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed += 1

          if changed < 1:
              raise SystemExit('No department pages were switched to v2')
          print(f'Switched {changed} department pages to v2.')
          PY

      - name: Commit switched pages
        run: |
          rm -f .github/workflows/switch-department-semester-layout-v2.yml
          rm -f .github/workflows/verify-semester-wise-department-layout.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Use stable semester grouping on Revision 2021 departments'
          git push origin HEAD:main

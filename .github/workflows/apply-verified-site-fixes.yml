name: Apply verified site fixes

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [fix/verified-site-bugs-2026-06-12]
    paths:
      - tools/fix_parts/**
      - .github/workflows/apply-verified-site-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/verified-site-bugs-2026-06-12
          fetch-depth: 0
      - name: Apply and statically verify fixes
        run: |
          cat tools/fix_parts/part-* > tools/apply_verified_site_fixes.py
          python -m py_compile tools/apply_verified_site_fixes.py
          if ! python tools/apply_verified_site_fixes.py >/tmp/fix-run.log 2>&1; then
            cat /tmp/fix-run.log
            git reset --hard HEAD
            cp /tmp/fix-run.log workflow-failure.log
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add workflow-failure.log
            git commit -m 'Capture site-fix verification failure'
            git push origin HEAD:fix/verified-site-bugs-2026-06-12
            exit 1
          fi
          cat /tmp/fix-run.log
          node --check assets/js/main.js
          node --check assets/js/subjects.js
          node --check assets/js/site-hardening.js
          node --check assets/js/help-comments.js
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix verified website bugs and structural issues' || exit 0
          git push origin HEAD:fix/verified-site-bugs-2026-06-12

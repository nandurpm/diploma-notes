name: Enrich Basic Electronics 2041

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/enrich-2041.yml

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Insert source-based notes
        run: |
          python - <<'PY'
          from pathlib import Path

          lesson_path = Path('lessons/lessons-2041.html')
          text = lesson_path.read_text(encoding='utf-8')
          fragment = Path('tmp-2041-source-enrichment.html').read_text(encoding='utf-8').strip()

          if 'id="source-enrichment"' in text:
              raise SystemExit('Source enrichment already exists.')

          nav_old = '<a href="#m4">Wave Shaping</a><a href="#formula-bank">Formula Bank</a>'
          nav_new = '<a href="#m4">Wave Shaping</a><a href="#source-enrichment">Expanded Notes</a><a href="#formula-bank">Formula Bank</a>'
          if nav_old not in text:
              raise SystemExit('Navigation marker not found.')
          text = text.replace(nav_old, nav_new, 1)

          toc_old = '<a href="#extended-electronics-notes">Extended Notes <span>→</span></a><a href="#expected">Expected Questions <span>→</span></a>'
          toc_new = '<a href="#extended-electronics-notes">Extended Notes <span>→</span></a><a href="#source-enrichment">Detailed Source Notes <span>→</span></a><a href="#expected">Expected Questions <span>→</span></a>'
          if toc_old not in text:
              raise SystemExit('Contents marker not found.')
          text = text.replace(toc_old, toc_new, 1)

          marker = '<section class="section" id="expected">'
          if marker not in text:
              raise SystemExit('Expected section marker not found.')
          text = text.replace(marker, fragment + '\n' + marker, 1)
          lesson_path.write_text(text, encoding='utf-8')
          PY

      - name: Commit lesson update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lessons-2041.html
          git commit -m "Expand Basic Electronics 2041 from tutorial source content"
          git push origin main

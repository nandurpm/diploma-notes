name: Fix 2031 duplicate indexing

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-2031-duplicate.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Mark source copy as non-indexed duplicate
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("lessons/handbook-2031-source.html")
          text = source.read_text(encoding="utf-8")

          old_url = "https://polypmna.dpdns.org/lessons/handbook-2031-source.html"
          official_url = "https://polypmna.dpdns.org/lessons/lessons-2031.html"
          text = text.replace(old_url, official_url)

          robots = '<meta name="robots" content="noindex,follow">'
          if robots not in text:
              marker = f'<link rel="canonical" href="{official_url}">'
              if marker not in text:
                  raise SystemExit("Canonical marker not found in 2031 source copy")
              text = text.replace(marker, robots + "\n  " + marker, 1)

          source.write_text(text, encoding="utf-8")

          main_js = Path("assets/js/main.js")
          js = main_js.read_text(encoding="utf-8")
          js = js.replace('  "/lessons/handbook-2031-source.html",\n', "")
          main_js.write_text(js, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-2031-duplicate.yml

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/handbook-2031-source.html assets/js/main.js .github/workflows/fix-2031-duplicate.yml
          git commit -m "Prevent duplicate indexing for lesson 2031 source"
          git push

name: Keep scrolling notice moving

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/keep-notice-moving.yml

permissions:
  contents: write

jobs:
  fix-notice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Prevent hover and focus from pausing the notice
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          style_path = Path('assets/css/style.css')
          style = style_path.read_text(encoding='utf-8')
          style = style.replace(
              '.site-notice:hover span { animation-play-state: paused; }',
              '.site-notice:hover span,\n.site-notice:focus-visible span { animation-play-state: running !important; }'
          )
          style_path.write_text(style, encoding='utf-8')

          responsive_path = Path('assets/css/responsive.css')
          responsive = responsive_path.read_text(encoding='utf-8')
          responsive = re.sub(
              r'\.site-notice:hover::after,\s*\.site-notice:focus-visible::after\s*\{\s*animation-play-state:\s*paused;\s*\}',
              '.site-notice:hover::after,\n.site-notice:focus-visible::after {\n  animation-play-state: running !important;\n}',
              responsive,
              count=1
          )
          responsive_path.write_text(responsive, encoding='utf-8')
          PY

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/keep-notice-moving.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/style.css assets/css/responsive.css .github/workflows/keep-notice-moving.yml
          git commit -m "Keep the site notice scrolling under the mouse pointer"
          git push origin main

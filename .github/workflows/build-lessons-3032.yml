name: Build lessons-3032 handbook

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-lessons-3032.yml
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Assemble standalone handbook
        run: |
          mkdir -p lessons
          cat tmp/lessons-3032-raw/*.part > lessons/lessons-3032.html
          cat tmp/lessons-3032-tail/*.part | base64 -d | gzip -d >> lessons/lessons-3032.html
          test -s lessons/lessons-3032.html
          test "$(sha256sum lessons/lessons-3032.html | awk '{print $1}')" = "c709059935d3e236f62e0d581a61443900dc114dc400e405d52363ba3d087566"
          grep -q '<title>DC Machines &amp; Traction Motors | Course 3032</title>' lessons/lessons-3032.html
          grep -q 'Complete Model Answers' lessons/lessons-3032.html
          grep -q 'Regenerative braking' lessons/lessons-3032.html

      - name: Remove staging files and workflow
        run: |
          rm -rf tmp/lessons-3032-raw tmp/lessons-3032-hex tmp/lessons-3032-tail
          rm -f .github/workflows/build-lessons-3032.yml

      - name: Commit completed handbook
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add complete lessons-3032 DC Machines handbook'
          git push origin HEAD:main

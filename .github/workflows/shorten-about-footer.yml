name: Shorten About footer

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/shorten-about-footer.yml

permissions:
  contents: write

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Keep only the copyright text
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('about.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '&copy; <span data-year></span> Diploma Notes. Independent static GitHub Pages study resource.',
              '&copy; <span data-year></span> Diploma Notes.'
          )

          text = re.sub(
              r"footerText:\s*'[^']*'",
              "footerText: '&copy; <span data-year></span> Diploma Notes.'",
              text
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/shorten-about-footer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep only the Diploma Notes copyright in the About footer"
          git push origin main

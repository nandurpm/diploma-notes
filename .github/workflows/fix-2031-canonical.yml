name: Fix lesson 2031 canonical URL

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-2031-canonical.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Correct canonical and Open Graph URL
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lessons/lessons-2031.html")
          text = path.read_text(encoding="utf-8")
          old = "https://polypmna.dpdns.org/lessons/handbook-2031-source.html"
          new = "https://polypmna.dpdns.org/lessons/lessons-2031.html"

          if old not in text:
              raise SystemExit("The outdated 2031 URL was not found; no unsafe rewrite performed.")

          text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-2031-canonical.yml

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lessons-2031.html .github/workflows/fix-2031-canonical.yml
          git commit -m "Correct lesson 2031 canonical URL"
          git push

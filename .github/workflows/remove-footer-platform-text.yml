name: Remove footer platform text

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/remove-footer-platform-text.yml"

permissions:
  contents: write

jobs:
  update-footers:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove footer phrase from all HTML files
        run: |
          python - <<'PY'
          from pathlib import Path

          phrase = " Static GitHub Pages study resource."
          changed = 0
          for path in Path('.').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              if phrase not in text:
                  continue
              path.write_text(text.replace(phrase, ''), encoding='utf-8')
              changed += 1

          if changed < 1:
              raise SystemExit('Footer phrase was not found in any HTML file')
          print(f'Updated {changed} HTML files.')
          PY

          if grep -RIl --include='*.html' 'Static GitHub Pages study resource' .; then
            echo 'Footer phrase still exists.'
            exit 1
          fi

      - name: Commit updated footers
        run: |
          rm .github/workflows/remove-footer-platform-text.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove GitHub Pages text from site footers'
          git push origin HEAD:main

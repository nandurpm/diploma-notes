name: Replace internal filename on Basic Electronics page

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-2041-course-card.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace internal filename card
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lessons/lessons-2041.html")
          text = path.read_text(encoding="utf-8")

          old = '<div class="m"><span>File</span><b>lessons-2041.html</b></div>'
          new = '<div class="m"><span>Course Title</span><b>Basic Electronics</b></div>'

          if old not in text:
              raise SystemExit("Expected internal filename card was not found")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-2041-course-card.yml

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lessons-2041.html .github/workflows/fix-2041-course-card.yml
          git commit -m "Replace internal filename on Basic Electronics page"
          git push

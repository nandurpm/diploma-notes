name: Apply bilingual scrolling notice

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-bilingual-notice.yml

permissions:
  contents: write

jobs:
  update-notice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update shared notice and Help assistant behavior
        env:
          NOTICE_B64: ""
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, json, os, re

          message = base64.b64decode(os.environ['NOTICE_B64']).decode('utf-8')
          css_message = message.replace('\\', '\\\\').replace('"', '\\"')

          responsive_path = Path('assets/css/responsive.css')
          responsive = responsive_path.read_text(encoding='utf-8')
          responsive = re.sub(
              r'content:\s*"This website is in its initial stage\.[^"]*";',
              f'content: "{css_message}";',
              responsive,
              count=1
          )
          if '.site-notice > span {' not in responsive:
              responsive = responsive.replace(
                  '.site-notice::after {',
                  '.site-notice > span { display: none !important; }\n.site-notice::after {',
                  1
              )
          responsive = responsive.replace('siteNoticeRightToLeft 20s', 'siteNoticeRightToLeft 58s')
          responsive = responsive.replace('animation-duration: 15s', 'animation-duration: 45s')
          responsive_path.write_text(responsive, encoding='utf-8')

          style_path = Path('assets/css/style.css')
          style = style_path.read_text(encoding='utf-8')
          notice_block = f'''.site-notice span {{ display: none !important; }}
.site-notice::after {{
  content: "{css_message}";
  display: inline-block;
  min-width: max-content;
  padding-left: 100%;
  color: #0f3f8a;
  font-family: Inter, "Noto Sans Malayalam", "Segoe UI", sans-serif;
  font-size: .88rem;
  font-weight: 850;
  animation: marqueeNotice 58s linear infinite;
  will-change: transform;
}}
.site-notice:hover::after,
.site-notice:focus-visible::after {{ animation-play-state: paused; }}'''
          style, count = re.subn(
              r'\.site-notice span \{.*?\}\n\.site-notice:hover span \{.*?\}',
              notice_block,
              style,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit('Could not update the shared site-notice block in style.css')
          style_path.write_text(style, encoding='utf-8')

          js_path = Path('assets/js/main.js')
          js = js_path.read_text(encoding='utf-8')
          js = re.sub(
              r'notice\.textContent = "This website is in its initial stage\.[^"]*";',
              'notice.textContent = ' + json.dumps(message, ensure_ascii=False) + ';',
              js,
              count=1
          )
          old = 'if (window.location.pathname.includes("/lessons/") || document.querySelector(".poly-ai-button")) return;'
          new = '''const assistantPath = window.location.pathname.toLowerCase().replace(/\\/+$/, "");
  if (assistantPath.includes("/lessons/") || assistantPath.endsWith("/contact.html")) {
    document.getElementById("polySiteAssistant")?.remove();
    return;
  }
  if (document.querySelector(".poly-ai-button")) return;'''
          if old in js:
              js = js.replace(old, new, 1)
          js_path.write_text(js, encoding='utf-8')
          PY

      - name: Commit site-wide update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/style.css assets/css/responsive.css assets/js/main.js
          git commit -m "Add a bilingual scrolling notice across the site"
          git push origin main

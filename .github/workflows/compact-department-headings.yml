name: Compact department headings

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/compact-department-headings.yml

permissions:
  contents: write

jobs:
  update-headings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Add a shared compact department heading style
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          js_path = Path('assets/js/main.js')
          js = js_path.read_text(encoding='utf-8')

          function_code = r'''
function setupCompactDepartmentHeading() {
  const pathname = window.location.pathname.toLowerCase().replace(/\/+$/, "");
  if (!pathname.includes("/revision-2021/") || !pathname.endsWith(".html")) return;

  const pageTitle = document.querySelector(".page-title");
  if (!pageTitle) return;
  pageTitle.classList.add("compact-department-heading");

  if (document.getElementById("compactDepartmentHeadingStyles")) return;
  const style = document.createElement("style");
  style.id = "compactDepartmentHeadingStyles";
  style.textContent = `
    .page-title.compact-department-heading {
      min-height: 260px !important;
      padding: clamp(26px, 3vw, 46px) !important;
      margin-top: 16px !important;
      border-radius: 30px !important;
    }
    .page-title.compact-department-heading h1 {
      max-width: min(1120px, calc(100% - 190px)) !important;
      margin: 10px 0 12px !important;
      font-size: clamp(2rem, 3.35vw, 3.65rem) !important;
      line-height: 1.05 !important;
      letter-spacing: -0.045em !important;
      text-wrap: balance !important;
    }
    .page-title.compact-department-heading > p:not(.kicker) {
      max-width: 840px !important;
      margin: 0 !important;
      font-size: 1rem !important;
      line-height: 1.55 !important;
    }
    .page-title.compact-department-heading .kicker {
      min-height: 30px !important;
      margin-bottom: 8px !important;
      padding: 6px 11px !important;
      font-size: .7rem !important;
    }
    .page-title.compact-department-heading::before {
      top: 22px !important;
      right: 28px !important;
      padding: 7px 12px !important;
      font-size: .65rem !important;
    }
    .page-title.compact-department-heading::after {
      right: 42px !important;
      bottom: 28px !important;
      width: 86px !important;
      height: 86px !important;
      border-radius: 25px !important;
      font-size: 2.6rem !important;
      opacity: .62 !important;
    }
    @media (max-width: 900px) {
      .page-title.compact-department-heading {
        min-height: 225px !important;
        padding: 24px 20px !important;
      }
      .page-title.compact-department-heading h1 {
        max-width: calc(100% - 110px) !important;
        font-size: clamp(1.85rem, 5.4vw, 2.8rem) !important;
      }
      .page-title.compact-department-heading::after {
        right: 22px !important;
        bottom: 22px !important;
        width: 68px !important;
        height: 68px !important;
        border-radius: 20px !important;
        font-size: 2rem !important;
      }
    }
    @media (max-width: 620px) {
      .page-title.compact-department-heading {
        min-height: 190px !important;
        padding: 18px 14px !important;
        border-radius: 20px !important;
      }
      .page-title.compact-department-heading h1 {
        max-width: calc(100% - 58px) !important;
        margin: 8px 0 10px !important;
        font-size: clamp(1.5rem, 7vw, 2.05rem) !important;
        line-height: 1.1 !important;
      }
      .page-title.compact-department-heading > p:not(.kicker) {
        max-width: 100% !important;
        font-size: .9rem !important;
      }
      .page-title.compact-department-heading::before {
        position: static !important;
        display: inline-flex !important;
        width: fit-content !important;
        margin-bottom: 6px !important;
      }
      .page-title.compact-department-heading::after {
        right: 12px !important;
        bottom: 12px !important;
        width: 48px !important;
        height: 48px !important;
        border-radius: 15px !important;
        font-size: 1.45rem !important;
        opacity: .48 !important;
      }
    }
  `;
  document.head.append(style);
}
'''

          if 'function setupCompactDepartmentHeading()' not in js:
              marker = '\nfunction setupSiteAssistant() {'
              if marker not in js:
                  raise SystemExit('Could not locate setupSiteAssistant insertion point')
              js = js.replace(marker, function_code + marker, 1)

          call_marker = '  setupCompactSectionHeading();\n'
          if '  setupCompactDepartmentHeading();\n' not in js:
              if call_marker not in js:
                  raise SystemExit('Could not locate DOMContentLoaded setup call')
              js = js.replace(call_marker, call_marker + '  setupCompactDepartmentHeading();\n', 1)

          js_path.write_text(js, encoding='utf-8')

          # Cache-bust main.js on all pages so every department gets the fix.
          for html_path in Path('.').rglob('*.html'):
              text = html_path.read_text(encoding='utf-8')
              updated = re.sub(
                  r'(assets/js/main\.js)(?:\?v=[^"\']*)?',
                  r'\1?v=20260614-department-heading1',
                  text
              )
              if updated != text:
                  html_path.write_text(updated, encoding='utf-8')
          PY

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/compact-department-headings.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use compact headings across all department pages"
          git push origin main

name: Add missing canonical metadata

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/add-missing-canonical-tags.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add canonical and Open Graph URLs
        run: |
          python - <<'PY'
          from pathlib import Path

          pages = {
              Path("materials-2015.html"): "https://polypmna.dpdns.org/materials-2015.html",
              Path("lessons/lessons-3023.html"): "https://polypmna.dpdns.org/lessons/lessons-3023.html",
              Path("lessons/lessons-3032.html"): "https://polypmna.dpdns.org/lessons/lessons-3032.html",
          }

          for path, url in pages.items():
              text = path.read_text(encoding="utf-8")
              canonical = f'<link rel="canonical" href="{url}">'
              og_url = f'<meta property="og:url" content="{url}">'

              if canonical in text and og_url in text:
                  continue

              head_end = text.lower().find("</head>")
              if head_end == -1:
                  raise SystemExit(f"Missing </head> in {path}")

              block = ""
              if canonical not in text:
                  block += f"  {canonical}\n"
              if og_url not in text:
                  block += f"  {og_url}\n"

              text = text[:head_end] + block + text[head_end:]
              path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/add-missing-canonical-tags.yml

      - name: Commit metadata updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add materials-2015.html lessons/lessons-3023.html lessons/lessons-3032.html .github/workflows/add-missing-canonical-tags.yml
          git commit -m "Add canonical metadata to remaining pages"
          git push

name: Correct lesson footer domain

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-lesson-footer-domain.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace outdated lesson footer domain
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              Path("lessons/lessons-1002.html"),
              Path("lessons/lessons-1003.html"),
              Path("lessons/lessons-1004.html"),
              Path("lessons/lessons-1006.html"),
              Path("lessons/lessons-3041.html"),
              Path("lessons/lessons-3045.html"),
              Path("lessons/lessons-3046.html"),
              Path("lessons/lessons-3047.html"),
          ]

          old = "nandakumarm.dpdns.org"
          new = "polypmna.dpdns.org"

          for path in files:
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  continue
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/fix-lesson-footer-domain.yml

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lessons-1002.html lessons/lessons-1003.html lessons/lessons-1004.html lessons/lessons-1006.html lessons/lessons-3041.html lessons/lessons-3045.html lessons/lessons-3046.html lessons/lessons-3047.html .github/workflows/fix-lesson-footer-domain.yml
          git commit -m "Correct POLY PMNA domain in lesson footers"
          git push

name: Update developer links

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-developer-links.yml

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Make Update notice clickable and replace footer reference
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          developer_url = 'https://nandakumarm.dpdns.org/about.html'

          # Update the shared notice destination.
          js_path = Path('assets/js/main.js')
          js = js_path.read_text(encoding='utf-8')
          js = js.replace(
              'notice.href = "https://nandakumarm.dpdns.org/about.html#contact";',
              f'notice.href = "{developer_url}";'
          )
          js_path.write_text(js, encoding='utf-8')

          # Restore clicking while explicitly keeping the marquee animation running.
          for css_name in ('assets/css/style.css', 'assets/css/responsive.css'):
              css_path = Path(css_name)
              css = css_path.read_text(encoding='utf-8')
              css = css.replace('  pointer-events: none !important;\n', '')
              css = css.replace(
                  'animation-play-state: running !important;\n  will-change:',
                  'animation-play-state: running !important;\n  pointer-events: auto !important;\n  will-change:'
              )
              css_path.write_text(css, encoding='utf-8')

          # Replace the obsolete official model-QP footer link on every portal page.
          footer_pattern = re.compile(
              r'<a\s+href="https://www\.sitttrkerala\.ac\.in/index\.php\?r=site%2Fdiploma-modelqp&amp;scheme=REV2021"[^>]*>Official REV2021 model QP reference</a>'
              r'|<a\s+href="https://www\.sitttrkerala\.ac\.in/index\.php\?r=site%2Fdiploma-modelqp&scheme=REV2021"[^>]*>Official REV2021 model QP reference</a>',
              re.I
          )
          replacement = (
              f'<a href="{developer_url}" target="_blank" '
              'rel="noopener noreferrer">Connect to Developer</a>'
          )

          changed = 0
          for html_path in Path('.').rglob('*.html'):
              text = html_path.read_text(encoding='utf-8')
              updated, count = footer_pattern.subn(replacement, text)
              if count:
                  html_path.write_text(updated, encoding='utf-8')
                  changed += count

          if changed == 0:
              raise SystemExit('No footer reference links were found to replace.')
          print(f'Replaced {changed} footer links.')
          PY

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/update-developer-links.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Link Update notice and footers to the developer page"
          git push origin main

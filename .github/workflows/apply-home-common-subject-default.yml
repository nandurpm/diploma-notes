name: Apply homepage common-subject default

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-home-common-subject-default.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update homepage subject finder behavior
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          main_path = Path('assets/js/main.js')
          main = main_path.read_text(encoding='utf-8')
          old_empty = '''    if (homepageSearchMode && !query) {
              grid.innerHTML = '<p class="empty">Search a subject code, title, department, or semester to show matching Kerala Polytechnic subject cards.</p>';
              return;
            }

'''
          if old_empty not in main:
              raise SystemExit('Homepage empty-state block was not found in main.js')
          main = main.replace(old_empty, '', 1)

          old_visible = '''    const visible = sortSubjectsSemesterWise(subjects.filter((subject) => {
              const text = [subject.revision, subject.code, subject.name, subject.department, subject.semester, subject.type].join(" ").toLowerCase();
              if (revision !== "all" && subject.revision !== revision) return false;
              if (semester !== "all" && subject.semester !== semester) return false;
              if (query && !text.includes(query)) return false;
              if (department !== "all") {
                if (subject.department === department) return true;
                if (fixedDepartment && subject.revision === revision && revision === "2021" && subject.department === "First Year / Common") return true;
                return false;
              }
              return true;
            }), fixedDepartment);'''
          new_visible = '''    const homepageDefault = homepageSearchMode
              && !query
              && revision === "all"
              && department === "all"
              && semester === "all";
            const sourceSubjects = homepageDefault
              ? subjects.filter((subject) => subject.revision === "2021" && subject.department === "First Year / Common")
              : subjects;

            const visible = sortSubjectsSemesterWise(sourceSubjects.filter((subject) => {
              const text = [subject.revision, subject.code, subject.name, subject.department, subject.semester, subject.type].join(" ").toLowerCase();
              if (revision !== "all" && subject.revision !== revision) return false;
              if (semester !== "all" && subject.semester !== semester) return false;
              if (query && !text.includes(query)) return false;
              if (department !== "all") {
                if (subject.department === department) return true;
                if (fixedDepartment && subject.revision === revision && revision === "2021" && subject.department === "First Year / Common") return true;
                return false;
              }
              return true;
            }), fixedDepartment);'''
          if old_visible not in main:
              raise SystemExit('Subject-filter block was not found in main.js')
          main = main.replace(old_visible, new_visible, 1)
          main_path.write_text(main, encoding='utf-8')

          hardening_path = Path('assets/js/site-hardening.js')
          hardening = hardening_path.read_text(encoding='utf-8')
          old_matches = '''      const matches = sortSubjects(all.filter((item) => {
                if (revision !== "all" && String(item.revision) !== revision) return false;
                if (semester !== "all" && item.semester !== semester) return false;
                if (department !== "all" && item.department !== department) {
                  if (!(fixedDepartment && String(item.revision) === "2021" && item.department === "First Year / Common")) return false;
                }
                const text = [item.revision, item.code, item.name, item.department, item.semester, item.type].join(" ").toLocaleLowerCase();
                return !query || text.includes(query);
              }));'''
          new_matches = '''      const homepageDefault = homepage
                && !query
                && revision === "all"
                && department === "all"
                && semester === "all";
              const sourceSubjects = homepageDefault
                ? all.filter((item) => String(item.revision) === "2021" && item.department === "First Year / Common")
                : all;
              const matches = sortSubjects(sourceSubjects.filter((item) => {
                if (revision !== "all" && String(item.revision) !== revision) return false;
                if (semester !== "all" && item.semester !== semester) return false;
                if (department !== "all" && item.department !== department) {
                  if (!(fixedDepartment && String(item.revision) === "2021" && item.department === "First Year / Common")) return false;
                }
                const text = [item.revision, item.code, item.name, item.department, item.semester, item.type].join(" ").toLocaleLowerCase();
                return !query || text.includes(query);
              }));'''
          if old_matches not in hardening:
              raise SystemExit('Subject matches block was not found in site-hardening.js')
          hardening = hardening.replace(old_matches, new_matches, 1)

          old_status = '''      const limit = homepage ? 36 : matches.length;
              matches.slice(0, limit).forEach((subject) => grid.append(buildSubjectCard(subject)));
              status.textContent = matches.length > limit
                ? `Showing ${limit} of ${matches.length} subjects. Use search or filters to narrow the list.`
                : `${matches.length} ${matches.length === 1 ? "subject" : "subjects"} shown.`;'''
          new_status = '''      const limit = homepage && !homepageDefault ? 36 : matches.length;
              matches.slice(0, limit).forEach((subject) => grid.append(buildSubjectCard(subject)));
              if (homepageDefault) {
                status.textContent = "Common subjects available in every department.";
              } else {
                status.textContent = matches.length > limit
                  ? `Showing ${limit} of ${matches.length} subjects. Use search or filters to narrow the list.`
                  : `${matches.length} ${matches.length === 1 ? "subject" : "subjects"} shown.`;
              }'''
          if old_status not in hardening:
              raise SystemExit('Homepage result-status block was not found in site-hardening.js')
          hardening = hardening.replace(old_status, new_status, 1)
          hardening_path.write_text(hardening, encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          old_help = '<p>Example: type <strong>1001</strong>, <strong>electronics</strong>, <strong>semester 3</strong>, or any subject name.</p>'
          new_help = '<p>Common Revision 2021 subjects available in every department are shown by default. Search or use filters to browse the complete subject list.</p>'
          if old_help not in index:
              raise SystemExit('Homepage subject-finder helper text was not found')
          index_path.write_text(index.replace(old_help, new_help, 1), encoding='utf-8')
          PY

          node --check assets/js/main.js
          node --check assets/js/site-hardening.js
          grep -q 'Common subjects available in every department' assets/js/site-hardening.js
          grep -q 'subject.department === "First Year / Common"' assets/js/main.js
          grep -q 'Common Revision 2021 subjects available in every department are shown by default' index.html

      - name: Commit verified change
        shell: bash
        run: |
          rm -f .github/workflows/apply-home-common-subject-default.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Show common subjects by default on homepage'
          git push origin HEAD:main
